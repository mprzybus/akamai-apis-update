description: |
  Specifies an error response returned by the IoT OTA Updates API.
type: object
required:
  - code
  - title
additionalProperties: true
properties:
  title:
    type: string
    description: |
      A human-readable summary of the problem type.
    minLength: 1
  code:
    type: string
    description: |
      The unique code for an error.
    minLength: 1
  incidentId:
    type: string
    description: |
      A logging key useful when communicating about problems with Technical Support representatives.
    minLength: 1
  solution:
    type: string
    description: |
      A human-readable solution to a problem.
    minLength: 1
