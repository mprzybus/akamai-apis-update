description: |
  Specifies an error response returned by the IoT OTA Updates API.
type: object
required:
  - type
  - title
additionalProperties: true
properties:
  type:
    type: string
    format: uri
    description: |
      A non-navigable URI that identifies each error case.
  status:
    type: integer
    description: |
      The HTTP error code.
    minimum: 0
  title:
    type: string
    description: |
      A human-readable summary of the problem type.
    minLength: 1
  instance:
    type: string
    format: uri
    description: |
      A non-navigable URI that identifies each error instance.
  detail:
    type: string
    description: |
      A human-readable explanation specific to the problem.
    minLength: 1
  code:
    type: string
    description: |
      The unique code for an error.
    minLength: 1
  incidentId:
    type: string
    description: |
      A logging key useful when communicating about problems with Technical Support representatives.
    minLength: 1
  details:
    type: array
    description: |
      For errors with more than one detected problem, this represents a list of Problem Details objects. Each object provides details of a specific problem.
    minItems: 1
    items:
      $ref: http-problem-details-nested.yaml
