description: |
  Specifies nested details of an error response.
type: object
required:
  - code
  - message
additionalProperties: true
properties:
  field:
    type: string
    description: |
      A request parameter, path variable, or request body field that caused an error.
    minLength: 1
  code:
    type: string
    description: |
      The unique code for an error.
    minLength: 1
  message:
    type: string
    description: |
      A human-readable summary of the problem type.
    minLength: 1
  data:
    type: object
    description: |
      An object map with details about rejected values.
