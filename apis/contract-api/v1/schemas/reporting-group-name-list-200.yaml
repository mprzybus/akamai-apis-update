type: array
description: |
  A logical grouping of content provider (CP) codes.
items:
  type: object
  additionalProperties: false
  required:
  - id
  - name
  properties:
    id:
      type: integer
      description: |
        Unique identifier for each reporting group.
      minimum: 1
    name:
      type: string
      description: |
        The descriptive name you supply for each reporting group.
      minLength: 1
