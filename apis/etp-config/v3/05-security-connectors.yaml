openapi: 3.0.0
info:
  title: Security connectors
  version: v3
servers:
- url: https://{hostname}/etp-config/v3
tags:
- description: |
    Forwards suspicious or malicious traffic to identify machines that are infected with malware, attempt to download malware, or make requests to command and control servers. They can also be used as an HTTP or DNS forwarder.
  name: Security connectors
x-akamai:
  auth-type: EDGE_GRID
paths:
  /configs/{configId}/akamai-sinkholes:
    $ref: paths/akamai-sinkholes.yaml
  /configs/{configId}/akamai-sinkholes/latest-version:
    $ref: paths/latest-version.yaml
  /configs/{configId}/akamai-sinkholes/sc-latest-versions:
    $ref: paths/sc-latest-versions.yaml
  /configs/{configId}/akamai-sinkholes/{sinkholeId}:
    $ref: paths/sinkhole.yaml
  /configs/{configId}/akamai-sinkholes/{sinkholeId}/op/change-local-password:
    $ref: paths/change-local-password.yaml
  /configs/{configId}/akamai-sinkholes/{sinkholeId}/op/generate-activation-code:
    $ref: paths/generate-activation-code.yaml
  /configs/{configId}/akamai-sinkholes/{sinkholeId}/op/upgrade:
    $ref: paths/upgrade.yaml
  /configs/{configId}/akamai-sinkholes/{sinkholeId}/policy-assignment:
    $ref: paths/policy-assignment.yaml
