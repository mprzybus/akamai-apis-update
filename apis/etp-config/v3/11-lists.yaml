openapi: 3.0.0
info:
  title: Lists
  version: v3
servers:
- url: https://{hostname}/etp-config/v3
tags:
- description: |
    A list is a set of domain and IP addresses, URLs, and file hashes that are known or suspected to be malicious for a specific category of threat.
  name: Lists
- description: |
    By default, each policy is configured with Akamai security lists. These security lists contain domains and IP addresses identified by Akamai as threats in the category assigned to the list. Various network security resources are used to maintain and update these lists.
  name: Akamai built-in security lists
- description: |
    A collection of known DNS hosts that have already been resolved by a domain.
  name: DNS cache
x-akamai:
  auth-type: EDGE_GRID
paths:
  /akamai-lists:
    $ref: paths/akamai-lists.yaml
  /configs/{configId}/clear-dns-cache:
    $ref: paths/clear-dns-cache.yaml
  /configs/{configId}/lists:
    $ref: paths/lists.yaml
  /configs/{configId}/lists/quota:
    $ref: paths/quota.yaml
  /configs/{configId}/lists/{listId}:
    $ref: paths/list.yaml
  /configs/{configId}/lists/{listId}/items:
    $ref: paths/items.yaml
