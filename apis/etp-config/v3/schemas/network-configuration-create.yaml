type: object
description: |
  Lists network configuration properties.
additionalProperties: false
required:
- corporateNetworkInternalIPsv4
- locations
properties:
  bypassURLs:
    type: array
    description: |
      URLs that get bypassed from the network.
    minItems: 0
    items:
      type: string
  corporateNetworkDNSSuffixes:
    type: array
    description: |
      DNS domain suffixes for network.
    minItems: 0
    items:
      type: string
      minLength: 1
  corporateNetworkInternalIPsv4:
    type: array
    description: |
      IP addresses in IPv4 format for internal usage.
    minItems: 0
    items:
      type: string
      minLength: 1
  corporateNetworkInternalIPsv6:
    type: array
    description: |
      IP addresses in IPv6 format for internal usage.
    minItems: 0
    items:
      type: string
      minLength: 1
  locations:
    type: array
    description: |
      Locations in the network.
    minItems: 0
    items:
      type: object
      additionalProperties: false
      required:
      - IPsv4
      - IPsv6
      - locationId
      properties:
        IPsv4:
          type: array
          description: |
            IPv4 addresses.
          minItems: 0
          items:
            type: string
            minLength: 1
        IPsv6:
          type: array
          description: |
            IPv6 addresses.
          minItems: 0
          items:
            type: string
            minLength: 1
        locationId:
          type: string
          description: |
            Unique identifier for the location.
          readOnly: true
