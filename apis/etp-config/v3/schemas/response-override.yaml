type: object
description: |
  AVC response override with details.
additionalProperties: false
required:
- responseId
- responseInfo
- userIds
- groupIds
properties:
  responseId:
    type: integer
    description: |
      Unique identifier for the response.
    minimum: 1
  responseInfo:
    type: object
    description: |
      AVC response details.
    additionalProperties: false
    $ref: response-info.yaml
  userIds:
    type: array
    description: |
      AVC users for the AVC entity.
    minItems: 0
    items:
      type: string
      minLength: 1
  groupIds:
    type: array
    description: |
      AVC category user groups.
    minItems: 0
    items:
      type: string
      minLength: 1
