description: |
  Group policy properties.
type: array
items:
  type: object
  properties:
    order:
      type: integer
      description: |
        The policy mapping priority order.
    groups:
      description: |
        The groups the policy mapping applies to.
      type: array
      items:
        type: string
    policyId:
      description: |
        The unique ID of the policy mapped to the group.
      type: integer
    policyInfo:
      description: |
        Policy information.
      type: object
      properties:
        id:
          description: |
            The policy ID.
          type: integer
        name:
          description: |
            The policy name.
          type: string
      additionalProperties: false
  required:
    - order
    - groups
    - policyId
  additionalProperties: false
