type: array
description: |  
  Partial failure of location upload. These sub-locations couldn't be created from CSV file due to validation issues.     
items:
  type: object
  properties:
    name:
      type: string
      description: |  
        The location name.
    description: 
      type: string
      description: |  
        The location description. 
    policyInfo:
      type: object
      description: |  
        The policy info for the location.
      properties:
        name: 
          type: string
          description: |  
            The policy name for the location.
      additionalProperties: false
    exitPoints: 
      description: |  
        The exit points for the location.
      type: array
      items:
        type: object
        properties:
          addrType:
            type: string 
            enum: 
            - ADDR_TYPE_IPV4
            - ADDR_TYPE_IPV6
            description: |  
              The IP address type. Either `ADDR_TYPE_IPV4` or `ADDR_TYPE_IPV6`.
          ipAddr:
            type: string 
            description: |
              The IP address or CIDR block for your company used to match a policy to a request.
        additionalProperties: false
    dynamicExitPoints:
      description: |  
        The location's dynamic exit points.
      type: array
      items: 
        type: object
        properties:
          addrType:
            type: string 
            enum: 
              - ADDR_TYPE_IPV4
              - ADDR_TYPE_IPV6
            description: |  
                The IP address type. Either `ADDR_TYPE_IPV4` or `ADDR_TYPE_IPV6`.
          ipAddr:
            type: string 
            description: |
                The IP address or CIDR block for your company used to match a policy to a request.
        additionalProperties: false
    subLocations:
      type: array
      items:
        type: string
      description: |  
        The site's sublocations.
    error: 
      type: string 
      description: |  
        An error describing the validation issue.
    isOffnetworkLocation: 
      type: boolean
      description: |  
        Indicates if the site is an off-network location.
  additionalProperties: false