type: object
description: |
  Lists the properties in the network configuration response object.
additionalProperties: false
required:
- bypassURLs
- corporateNetworkDNSSuffixes
- corporateNetworkInternalIPsv4
- corporateNetworkInternalIPsv6
- createdBy
- createdDate
- locations
- networkConfigId
properties:
  bypassURLs:
    type: array
    description: |
      URLs that get bypassed from the network.
    minItems: 0
    items:
      type: string
      minLength: 1
  corporateEmailDomains:
    type: array
    description: |
      Corporate email domains.
    minItems: 0
    items:
      type: string
      minLength: 1
  corporateNetworkDNSSuffixes:
    type: array
    description: |
      DNS domain suffixes for each network.
    minItems: 0
    items:
      type: string
      minLength: 1
  corporateNetworkInternalIPsv4:
    type: array
    description: |
      IP addresses in IPv4 format for internal usage.
    minItems: 0
    items:
      type: string
      minLength: 1
  corporateNetworkInternalIPsv6:
    type: array
    description: |
      IP addresses in IPv6 format for internal usage.
    minItems: 0
    items:
      type: string
      minLength: 1
  createdBy:
    type: string
    description: |
      Name of the user who created this network config.
    minLength: 1
  createdDate:
    type: string
    description: |
      ISO 8601 timestamp marking this network config's creation.
    readOnly: true
    format: date-time
  dnsHostsV4:
    type: array
    description: |
      List IP address in IPv4 format of DNS Hosts.
    minItems: 0
    items:
      type: string
      minLength: 1
  dnsHostsV6:
    type: array
    description: |
      List IP address in IPv6 format of DNS Hosts.
    minItems: 0
    items:
      type: string
      minLength: 1
  locations:
    type: array
    description: |
      Locations in the network.
    minItems: 0
    items:
      type: object
      additionalProperties: false
      required:
      - IPsv4
      - IPsv6
      - locationId
      properties:
        IPsv4:
          type: array
          description: |
            IPv4 addresses.
          minItems: 0
          items:
            type: string
            minLength: 1
        IPsv6:
          type: array
          description: |
            IPv6 addresses.
          minItems: 0
          items:
            type: string
            minLength: 1
        locationId:
          type: string
          description: |
            Unique identifier for the location.
          minLength: 1
  modifiedBy:
    type: string
    description: |
      Name of the user who most recently modified the network config.
    minLength: 1
  modifiedDate:
    type: string
    description: |
      ISO 8601 timestamp marking this network config's last modification.
    readOnly: true
    format: date-time
  networkConfigId:
    type: integer
    description: |
      Unique identifier for this configuration.
    minimum: 1
  wgExceptionIpsv4:
    type: array
    description: |
      IP address exceptions in IPv4 format for walled garden.
    minItems: 0
    items:
      type: string
      minLength: 1
  wgExceptionIpsv6:
    type: array
    description: |
      IP address exceptions in IPv6 format for walled garden.
    minItems: 0
    items:
      type: string
      minLength: 1
  wgExceptionSuffixes:
    type: array
    description: |
      DNS suffixes for walled gardens.
    minItems: 0
    items:
      type: string
      minLength: 1
