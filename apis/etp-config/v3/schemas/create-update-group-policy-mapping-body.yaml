type: object
description: |
  Group-based policy mapping properties.
additionalProperties: true
properties:
  idpId:
    type: string
    description: |
      The unique IDP ID in Enterprise Application Access to map the group policy to. Run the [List IDPs](https://techdocs.akamai.com/eaa-api/reference/get-idps) operation to view your IDP IDs.
  directoryId:
    type: string
    description: |
      The unique directory ID in Enterprise Application Access to map the group policy to. Run the [List directories](https://techdocs.akamai.com/eaa-api/reference/get-directories) operation to view your directory IDs.
  groupPolicies:
    description: |
      Group policies.
    $ref: group-policies.yaml
