type: object
description: |
  The problem indicated by the 400 error response.
additionalProperties: true
required:
- title
- instance
- status
- detail
properties:
  title:
    type: string
    description: |
      A short, human-readable summary of the problem type.
    minLength: 1
  status:
    type: integer
    description: |
      The HTTP problem type.
  instance:
    type: string
    description: |
      The unique ID for this error.
  detail:
    type: string
    description: |
      A short, human-readable problem solution including a specific error code.