openapi: 3.0.0
info:
  title: Policies
  version: v3
servers:
- url: https://{hostname}/etp-config/v3
tags:
- description: |
    A policy is the rule set defining how SIA handles known or suspected DNS threats. You can assign a single policy to a location or multiple locations to a policy.
  name: Policies
- description: |
    Built-in responses are automated messages displayed to end users indicating when their activity violates a policy.
  name: Policy built-in responses
- description: |
    A set of default security threat categories for traffic that you can tailor to your organization's needs.
  name: Policy predefined security categories
x-akamai:
  auth-type: EDGE_GRID
paths:
  /configs/{configId}/policies:
    $ref: paths/policies.yaml
  /configs/{configId}/policies/{policyId}:
    $ref: paths/policy.yaml
  /configs/{configId}/policy-metadata:
    $ref: paths/policy-metadata.yaml
  /responses:
    $ref: paths/responses.yaml
  /securityCategories:
    $ref: paths/security-categories.yaml
