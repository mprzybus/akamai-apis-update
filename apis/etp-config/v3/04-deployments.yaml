openapi: 3.0.0
info:
  title: Deployments
  version: v3
servers:
- url: https://{hostname}/etp-config/v3
tags:
- description: |
    After applying configuration changes to a site, policy, emergency list, or honeypot, you must deploy these changes to the SIA network to ensure the changes take effect. Changes typically deploy within 20-30 seconds.
  name: Deployment configuration
- description: |
    A collection of the configuration changes made to an existing deployment.
  name: Deployment changes
x-akamai:
  auth-type: EDGE_GRID
paths:
  /configs/{configId}/deployments:
    $ref: paths/deployments.yaml
  /configs/{configId}/deployments/{configDeploymentId}:
    $ref: paths/config-deployment.yaml
  /configs/{configId}/deployments/{configDeploymentId}/diff:
    $ref: paths/diff.yaml
  /configs/{configId}/recentChanges:
    $ref: paths/recent-changes.yaml
