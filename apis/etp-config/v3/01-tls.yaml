openapi: 3.0.0
info:
  title: Certificates
  version: v3
servers:
- url: https://{hostname}/etp-config/v3
tags:
- description: |
    TLS certificates allow you to establish a secure connection using the public key provided by your certificate authority (CA). You can specify an Akamai-issued certificate or a customer-provisioned certificate using a trusted third-party CA.
  name: Proxy certificates
x-akamai:
  auth-type: EDGE_GRID
paths:
  /customers/{configId}/certificates:
    $ref: paths/certificates.yaml
  /customers/{configId}/certificates/{certificateId}:
    $ref: paths/certificate.yaml
  /customers/{configId}/certificates/{certificateId}/op/activate:
    $ref: paths/activate.yaml
  /customers/{configId}/certificates/{certificateId}/op/confirm-distribution:
    $ref: paths/confirm-distribution.yaml
  /customers/{configId}/certificates/{certificateId}/op/confirm-download:
    $ref: paths/confirm-download.yaml
  /customers/{configId}/certificates/{certificateId}/op/deactivate:
    $ref: paths/deactivate.yaml
