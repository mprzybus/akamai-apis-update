openapi: 3.0.0
info:
  title: Configurations
  version: v3
servers:
- url: https://{hostname}/etp-config/v3
tags:
- description: |
    When you sign up for SIA, you receive a configuration and associated ID. This configuration contains settings for all of your sites, such as locations, policies, and quick lists. You can configure network configurations, global settings, and add or remove connectors to your base SIA configuration.
  name: Configurations
- description: |
    Acknowledgements contain SIA keys and the customer's original account configuration agreement.
  name: Acknowledgments
- description: |
    Custom error pages allow the SIA admin to customize the error page displayed in a user's browser based on the configuration policy.
  name: Custom error pages
- description: |
    These operations control the state of the configuration wizard process when the admin uses the wizard.
  name: Configuration wizard
- description: |
    These operations control the bulk log export destination and schedule configurations.
  name: Bulk log export
- description: |
    These operations allow the admin to assign policies based on users and groups.
  name: User and group-based policies
x-akamai:
  auth-type: EDGE_GRID
paths:
  /configs/all:
    $ref: paths/all.yaml
  /configs/onboard:
    $ref: paths/onboard.yaml
  /configs/{configId}/acknowledgment:
    $ref: paths/acknowledgment.yaml
  /configs/{configId}/custom-error-page:
    $ref: paths/custom-error-page.yaml
  /configs/{configId}/firstTimeWizard:
    $ref: paths/first-time-wizard.yaml
  /configs/{configId}/log-export:
    $ref: paths/log-export.yaml
  /configs/{configId}/log-export/schedule:
    $ref: paths/schedule.yaml
  /configs/{configId}/log-export/schedule/{logExportScheduleId}/op/disable:
    $ref: paths/disable.yaml
  /configs/{configId}/log-export/schedule/{logExportScheduleId}/op/enable:
    $ref: paths/enable.yaml
  /configs/{configId}/log-export/{id}:
    $ref: paths/id.yaml
  /configs/{configId}/idp-groups-policy:
    $ref: paths/user-group-based-policy.yaml
  /configs/{configId}/idp-groups-policy/{idpGroupPolicyId}:
    $ref: paths/user-group-based-policy-by-id.yaml
  /configs/{configId}/idp-groups-policy/for-idp/{idpId}:
    $ref: paths/user-group-policies-delete.yaml
