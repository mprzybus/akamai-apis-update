additionalProperties: false
type: object
description: |
  Provides an event type with possible multiple event definitions.
properties:
  eventDefinitions:
    type: array
    description: |
      Provides information about an event type definition.
    items:
      type: object
      additionalProperties: false
      properties:
        eventDescription:
          description: |
            The description of an event.
          type: string
        eventDefinitionId:
          description: |
            The ID of an event definition.
          type: string
        eventName:
          description: |
            The name of an event.
          type: string
  eventTypeId:
    description: |
      The ID of the event type.
    type: string
  eventTypeName:
    description: |
      The name of the event type.
    type: string
