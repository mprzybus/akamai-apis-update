name: end
in: query
description: |
  End date in ISO 8601 format. Use this parameter together with `start`, or else replace both with a fixed `timeRange`. Read more about [setting the report time range](ref:api-workflow#set-the-report-time-range).
schema:
  type: string
  example: '2024-06-02T00:00:00Z'
  format: date-time
