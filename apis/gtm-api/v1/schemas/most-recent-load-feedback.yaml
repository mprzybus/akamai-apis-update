type: object
additionalProperties: false
required:
- data
properties:
  data:
    type: array
    description: |
      The most recent load feedback data points across all data centers for the domain.
    items:
      type: object
      additionalProperties: false
      required:
      - current
      - currentSmoothed
      - datacenterId
      - datacenterName
      - resource
      - target
      - targetSmoothed
      - capacity
      - capacitySmoothed
      - ip
      - errortype
      - tag
      - time
      - loadserver
      properties:
        datacenterId:
          type: integer
          description: |
            The ID of the data center reporting this load value.
        datacenterName:
          type: string
          minLength: 1
          description: |
            The nickname of the data center.
        resource:
          type: string
          minLength: 1
          description: |
            The name of the resource being measured.
        current:
          type: integer
          description: |
            The current raw load value.
        currentSmoothed:
          type: integer
          description: |
            The current smoothed load value.
        target:
          type: integer
          description: |
            The target raw load value.
        targetSmoothed:
          type: integer
          description: |
            The target smoothed load value.
        capacity:
          type: integer
          description: |
            The capacity raw value.
        capacitySmoothed:
          type: integer
          description: |
            The capacity smoothed value.
        ip:
          type: string
          minLength: 1
          description: |
            The IP address of the load reporting server.
        loadserver:
          type: string
          minLength: 1
          description: |
            The hostname of the load reporting server.
        errortype:
          type: string
          description: |
            The error type if load feedback reporting failed, or empty if successful.
        tag:
          type: string
          description: |
            An opaque tag identifying the load feedback session.
        time:
          type: string
          description: |
            An ISO 8601 timestamp indicating when this load feedback reading was taken.
