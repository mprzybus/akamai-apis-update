additionalProperties: false
properties:
  dataRows:
    description: |
      The traffic data rows for the reporting period.
    items:
      additionalProperties: false
      properties:
        datacenters:
          description: |
            The data centers that received traffic for this property during this interval.
          items:
            additionalProperties: false
            properties:
              datacenterId:
                description: |
                  The data center ID.
                type: integer
              nickname:
                description: |
                  The data center nickname.
                type: string
                minLength: 1
              requests:
                description: |
                  The number of DNS requests received during this interval.
                type: number
              status:
                description: |
                  The status code for this data center during this interval.
                type: string
                minLength: 1
              trafficTargetName:
                description: |
                  The name of the traffic target.
                type: string
                minLength: 1
            required:
            - datacenterId
            - nickname
            - trafficTargetName
            - requests
            - status
            type: object
          type: array
        timestamp:
          description: |
            An ISO 8601 timestamp indicating when this data row was recorded.
          type: string
      required:
      - timestamp
      - datacenters
      type: object
    type: array
  dataSummary:
    description: |
      Summary statistics for the report.
    type: object
  links:
    items:
      $ref: links.yaml
    type: array
    description: |
      Hypermedia links to help navigate through the result set, or to identify the current item whose `rel` is `self`.
  metadata:
    description: |
      Report metadata describing the query parameters and resource URI.
    additionalProperties: false
    properties:
      domain:
        description: |
          The GTM domain name.
        type: string
        minLength: 1
      end:
        description: |
          An ISO 8601 timestamp indicating when the reporting period ends.
        type: string
      interval:
        description: |
          The reporting interval. Always `FIVE_MINUTE`.
        enum:
        - FIVE_MINUTE
        type: string
      property:
        description: |
          The GTM property name.
        type: string
        minLength: 1
      start:
        description: |
          An ISO 8601 timestamp indicating when the reporting period starts.
        type: string
      uri:
        description: |
          The URL of this report.
        format: uri
        type: string
    required:
    - uri
    - domain
    - property
    - start
    - end
    type: object
required:
- metadata
- dataRows
- links
type: object
