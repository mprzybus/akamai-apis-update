additionalProperties: false
properties:
  dataRows:
    description: |
      The demand data rows for the reporting period.
    items:
      additionalProperties: false
      properties:
        datacenters:
          description: |
            The data centers included in this demand row.
          items:
            additionalProperties: false
            properties:
              datacenterId:
                description: |
                  The data center ID.
                type: integer
              nickname:
                description: |
                  The data center nickname.
                type: string
                minLength: 1
              percentActual:
                description: |
                  The actual percentage of traffic directed to this data center.
                type: number
              percentProvisioned:
                description: |
                  The provisioned percentage of traffic for this data center.
                type: number
              trafficTargetName:
                description: |
                  The name of the traffic target for this data center.
                type: string
                minLength: 1
            required:
            - datacenterId
            - nickname
            - trafficTargetName
            - percentProvisioned
            - percentActual
            type: object
          type: array
        timestamp:
          description: |
            An ISO 8601 timestamp indicating when this data row was recorded.
          type: string
      type: object
    type: array
  dataSummary:
    description: |
      Summary statistics for the report.
    type: object
  links:
    items:
      $ref: links.yaml
    type: array
    description: |
      Hypermedia links to help navigate through the result set, or to identify the current item whose `rel` is `self`.
  metadata:
    description: |
      Report metadata describing the query parameters and resource URI.
    additionalProperties: false
    properties:
      domain:
        description: |
          The GTM domain name.
        type: string
        minLength: 1
      end:
        description: |
          An ISO 8601 timestamp indicating when the reporting period ends.
        type: string
      property:
        description: |
          The GTM property name.
        type: string
        minLength: 1
      start:
        description: |
          An ISO 8601 timestamp indicating when the reporting period starts.
        type: string
      uri:
        description: |
          The URL of this report.
        format: uri
        type: string
    required:
    - domain
    - property
    - uri
    - start
    - end
    type: object
required:
- metadata
- dataRows
- links
type: object
