type: object
additionalProperties: false
required:
- metadata
- dataRows
- links
properties:
  metadata:
    type: object
    additionalProperties: false
    description: |
      Report metadata describing the query parameters and resource URI.
    required:
    - domain
    - start
    - end
    - uri
    properties:
      domain:
        type: string
        minLength: 1
        description: |
          The GTM domain name.
      start:
        type: string
        description: |
          An ISO 8601 timestamp indicating when the reporting period starts.
      end:
        type: string
        description: |
          An ISO 8601 timestamp indicating when the reporting period ends.
      uri:
        type: string
        format: uri
        description: |
          The URL of this report.
  dataRows:
    type: array
    description: |
      The diagnostic data rows for the reporting period.
    items:
      type: object
      additionalProperties: false
      properties:
        timestamp:
          type: string
          description: |
            An ISO 8601 timestamp indicating when this data row was recorded.
        type:
          type: string
          description: |
            Whether this row represents an autonomous system (`AS`) or country (`COUNTRY`) mapping.
          enum:
          - AS
          - COUNTRY
        datacenter:
          type: object
          nullable: true
          additionalProperties: false
          description: |
            The datacenter associated with this row.
          properties:
            name:
              type: string
              minLength: 1
              description: |
                The datacenter nickname.
            datacenterId:
              type: integer
              description: |
                The datacenter ID.
        autonomousSystem:
          type: object
          nullable: true
          additionalProperties: false
          description: |
            The autonomous system mapped to the datacenter, if `type` is `AS`.
          properties:
            number:
              type: integer
              description: |
                The autonomous system number.
            name:
              type: string
              minLength: 1
              description: |
                The autonomous system name.
        country:
          type: object
          nullable: true
          additionalProperties: false
          description: |
            The country mapped to the datacenter, if `type` is `COUNTRY`.
          properties:
            code:
              type: string
              minLength: 1
              description: |
                The two-letter ISO country code.
            name:
              type: string
              minLength: 1
              description: |
                The full country name.
            continentCode:
              type: string
              nullable: true
              description: |
                The two-letter continent code, either `AF` (Africa), `AN` (Antarctica), `AS` (Asia), `EU` (Europe), `NA` (North America), `OC` (Oceania), or `SA` (South America). `null` if unknown.
              enum:
              - AF
              - AN
              - AS
              - EU
              - NA
              - OC
              - SA
        percent:
          type: number
          description: |
            The percentage of traffic mapped to this datacenter from this AS or country.
  dataSummary:
    type: object
    description: |
      Summary statistics for the report.
  links:
    type: array
    description: |
      Hypermedia links to help navigate through the result set, or to identify the current item whose `rel` is `self`.
    items:
      $ref: links.yaml
