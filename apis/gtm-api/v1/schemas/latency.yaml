additionalProperties: false
properties:
  dataRows:
    description: |
      The latency data rows for the reporting period.
    items:
      additionalProperties: false
      properties:
        latency:
          description: |
            The latency bucket counts for each defined range.
          items:
            type: integer
          type: array
        loss:
          description: |
            The packet loss bucket counts for each defined range.
          items:
            type: integer
          type: array
        timestamp:
          description: |
            An ISO 8601 timestamp indicating when this data row was recorded.
          type: string
      required:
      - timestamp
      - latency
      - loss
      type: object
    type: array
  dataSummary:
    description: |
      Summary statistics for the report.
    type: object
  links:
    items:
      $ref: links.yaml
    type: array
    description: |
      Hypermedia links to help navigate through the result set, or to identify the current item whose `rel` is `self`.
  metadata:
    description: |
      Report metadata describing the query parameters and resource URI.
    additionalProperties: false
    properties:
      datacenterId:
        description: |
          The data center ID.
        type: integer
      datacenterNickname:
        description: |
          The data center nickname.
        type: string
        minLength: 1
      domain:
        description: |
          The GTM domain name.
        type: string
        minLength: 1
      end:
        description: |
          An ISO 8601 timestamp indicating when the reporting period ends.
        type: string
      latency:
        description: |
          The latency bucket schema applied to this report.
        type: string
        minLength: 1
      loss:
        description: |
          The packet loss bucket schema applied to this report.
        type: string
        minLength: 1
      start:
        description: |
          An ISO 8601 timestamp indicating when the reporting period starts.
        type: string
      uri:
        description: |
          The URL of this report.
        format: uri
        type: string
    required:
    - domain
    - datacenterId
    - datacenterNickname
    - latency
    - loss
    - start
    - end
    - uri
    type: object
required:
- metadata
- dataRows
- links
type: object
