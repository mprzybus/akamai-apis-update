additionalProperties: false
properties:
  datacenters:
    description: |
      The data centers configured for the domain.
    items:
      additionalProperties: false
      properties:
        datacenterId:
          description: |
            The data center ID.
          type: integer
        datacenterNickname:
          description: |
            The data center nickname.
          type: string
          minLength: 1
      required:
      - datacenterId
      - datacenterNickname
      type: object
    type: array
  links:
    items:
      $ref: links.yaml
    type: array
    description: |
      Hypermedia links to help navigate through the result set, or to identify the current item whose `rel` is `self`.
  name:
    description: |
      The GTM domain name.
    type: string
    minLength: 1
  properties:
    description: |
      The GTM property names configured for the domain.
    items:
      type: string
      minLength: 1
    type: array
  resources:
    description: |
      The load-feedback resource names configured for the domain.
    items:
      type: string
      minLength: 1
    type: array
required:
- name
- properties
- datacenters
- resources
- links
type: object
