additionalProperties: false
properties:
  dataRows:
    description: |
      The liveness test failure rows for the reporting period.
    items:
      additionalProperties: false
      properties:
        datacenters:
          description: |
            The data centers with liveness test failures for this timestamp.
          items:
            additionalProperties: false
            properties:
              agentIp:
                description: |
                  The IP address of the web agent that ran the liveness test.
                type: string
                minLength: 1
              datacenterId:
                description: |
                  The data center ID.
                type: integer
              duration:
                description: |
                  The duration of the consecutive failure run, in seconds.
                type: integer
              errorCode:
                description: |
                  The liveness test error code.
                type: integer
              nickname:
                description: |
                  The data center nickname.
                type: string
                minLength: 1
              targetIp:
                description: |
                  The IP address of the origin server tested.
                type: string
                minLength: 1
              testName:
                description: |
                  The name of the liveness test.
                type: string
                minLength: 1
              trafficTargetName:
                description: |
                  The name of the traffic target.
                type: string
                minLength: 1
            required:
            - datacenterId
            - nickname
            - trafficTargetName
            - targetIp
            - agentIp
            - testName
            - errorCode
            - duration
            type: object
          type: array
        timestamp:
          description: |
            An ISO 8601 timestamp indicating when this data row was recorded.
          type: string
      required:
      - timestamp
      - datacenters
      type: object
    type: array
  dataSummary:
    description: |
      Summary statistics for the report.
    type: object
  links:
    items:
      $ref: links.yaml
    type: array
    description: |
      Hypermedia links to help navigate through the result set, or to identify the current item whose `rel` is `self`.
  metadata:
    description: |
      Report metadata describing the query parameters and resource URI.
    additionalProperties: false
    properties:
      agentIp:
        description: |
          The IP address of the web agent filtered on, if applicable.
        format: ip
        type: string
      date:
        description: |
          The date of the liveness test report.
        format: date
        type: string
      domain:
        description: |
          The GTM domain name.
        type: string
        minLength: 1
      property:
        description: |
          The GTM property name.
        type: string
        minLength: 1
      targetIp:
        description: |
          The IP address of the origin server filtered on, if applicable.
        format: ip
        type: string
      uri:
        description: |
          The URL of this report.
        format: uri
        type: string
    required:
    - domain
    - property
    - date
    - uri
    type: object
required:
- metadata
- dataRows
- links
type: object
