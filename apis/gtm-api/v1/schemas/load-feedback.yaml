additionalProperties: false
properties:
  dataRows:
    description: |
      The load feedback data rows for the reporting period.
    items:
      additionalProperties: false
      properties:
        datacenters:
          description: |
            The data centers included in this load feedback row.
          items:
            additionalProperties: false
            properties:
              currentLoad:
                description: |
                  The current load reported by this data center.
                type: number
              datacenterId:
                description: |
                  The data center ID.
                type: integer
              maximumLoad:
                description: |
                  The maximum load capacity of this data center.
                type: number
              nickname:
                description: |
                  The data center nickname.
                type: string
                minLength: 1
              targetLoad:
                description: |
                  The target load for this data center.
                type: number
            required:
            - datacenterId
            - nickname
            - currentLoad
            - targetLoad
            - maximumLoad
            type: object
          type: array
        timestamp:
          description: |
            An ISO 8601 timestamp indicating when this data row was recorded.
          type: string
      type: object
    type: array
  dataSummary:
    description: |
      Summary statistics for the report.
    type: object
  links:
    items:
      $ref: links.yaml
    type: array
    description: |
      Hypermedia links to help navigate through the result set, or to identify the current item whose `rel` is `self`.
  metadata:
    description: |
      Report metadata describing the query parameters and resource URI.
    additionalProperties: false
    properties:
      domain:
        description: |
          The GTM domain name.
        type: string
        minLength: 1
      end:
        description: |
          An ISO 8601 timestamp indicating when the reporting period ends.
        type: string
      resource:
        description: |
          The load-feedback resource name.
        type: string
        minLength: 1
      start:
        description: |
          An ISO 8601 timestamp indicating when the reporting period starts.
        type: string
      uri:
        description: |
          The URL of this report.
        format: uri
        type: string
    required:
    - domain
    - resource
    - start
    - end
    - uri
    type: object
required:
- metadata
- dataRows
- links
type: object
