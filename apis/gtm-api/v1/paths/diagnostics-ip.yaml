x-akamai:
  path-info: /diagnostics/ip/domains/{domain}/properties/{property}
parameters:
- $ref: ../parameters/property-path.yaml
- $ref: ../parameters/domain-path.yaml
get:
  operationId: get-diagnostics-ip
  summary: Report IP diagnostics
  tags:
  - Diagnostics
  description: |
    Returns diagnostic data showing the per-name server mapping decisions made by GTM for the given domain, property, IP address, and time period. Includes scoring details such as latency, ping scores, and which datacenter was selected.
  parameters:
  - $ref: ../parameters/start-query.yaml
  - $ref: ../parameters/end-query.yaml
  - $ref: ../parameters/ip-required-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-diagnostics-ip-200.json
          schema:
            $ref: ../schemas/ip-diagnostics.yaml
