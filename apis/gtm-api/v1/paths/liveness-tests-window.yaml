x-akamai:
  path-info: /liveness-tests/window
get:
  operationId: get-liveness-tests-window
  summary: Get a liveness test report window
  tags:
  - Liveness
  description: |
    Returns the date range of data available for liveness test reports. Use the returned `start` and `end` values as the bounds for queries to the liveness test report endpoint.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-report-window-200.json
          schema:
            $ref: ../schemas/report-window.yaml
