x-akamai:
  path-info: /load-feedback/domains/{domain}/most-recent-load-data
parameters:
- $ref: ../parameters/domain-path.yaml
get:
  operationId: get-most-recent-load-data
  summary: Get most recent load feedback data
  tags:
  - Load feedback
  description: |
    Returns the most recent load feedback values reported by each data center for the given domain. This provides a snapshot of the current load state across all data centers.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-most-recent-load-data-200.json
          schema:
            $ref: ../schemas/most-recent-load-feedback.yaml
