x-akamai:
  path-info: /diagnostics/datacenter/domains/{domain}
parameters:
- $ref: ../parameters/domain-path.yaml
get:
  operationId: get-diagnostics-datacenter
  summary: Report datacenter diagnostics
  tags:
  - Diagnostics
  description: |
    Returns diagnostic data showing how traffic from autonomous systems and countries is being distributed across datacenters for the given domain and time period.
  parameters:
  - $ref: ../parameters/start-query.yaml
  - $ref: ../parameters/end-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-diagnostics-datacenter-200.json
          schema:
            $ref: ../schemas/datacenter-diagnostics.yaml
