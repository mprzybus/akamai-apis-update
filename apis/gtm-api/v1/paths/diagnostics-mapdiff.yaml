x-akamai:
  path-info: /diagnostics/mapdiff/domains/{domain}
parameters:
- $ref: ../parameters/domain-path.yaml
get:
  operationId: get-diagnostics-mapdiff
  summary: Report map diff diagnostics
  tags:
  - Diagnostics
  description: |
    Returns a diff of traffic distribution map snapshots for the given domain and time period, showing how AS and country-to-datacenter mappings changed between consecutive five-minute intervals.
  parameters:
  - $ref: ../parameters/start-query.yaml
  - $ref: ../parameters/end-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-diagnostics-mapdiff-200.json
          schema:
            $ref: ../schemas/mapdiff-diagnostics.yaml
