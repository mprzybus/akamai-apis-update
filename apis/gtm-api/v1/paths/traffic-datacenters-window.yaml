x-akamai:
  path-info: /traffic/datacenters-window
get:
  operationId: get-traffic-datacenters-window
  summary: Get a datacenter traffic report window
  tags:
  - Traffic
  description: |
    Returns the date range of data available for datacenter traffic reports. Use the returned `start` and `end` values as the bounds for queries to the datacenter traffic report endpoint.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-report-window-200.json
          schema:
            $ref: ../schemas/report-window.yaml
