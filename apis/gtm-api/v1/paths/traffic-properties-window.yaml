x-akamai:
  path-info: /traffic/properties-window
get:
  operationId: get-traffic-properties-window
  summary: Get a property traffic report window
  tags:
  - Traffic
  description: |
    Returns the date range of data available for property traffic reports. Use the returned `start` and `end` values as the bounds for queries to the property traffic report endpoint.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-report-window-200.json
          schema:
            $ref: ../schemas/report-window.yaml
