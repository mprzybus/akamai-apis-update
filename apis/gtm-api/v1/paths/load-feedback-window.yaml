x-akamai:
  path-info: /load-feedback/domains/{domain}/window
parameters:
- $ref: ../parameters/domain-path.yaml
get:
  operationId: get-load-feedback-window
  summary: Get a load feedback report window
  tags:
  - Load feedback
  description: |
    Returns the date range of data available for load feedback reports. Use the returned `start` and `end` values as the bounds for queries to the load feedback report endpoint.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-report-window-200.json
          schema:
            $ref: ../schemas/report-window.yaml
