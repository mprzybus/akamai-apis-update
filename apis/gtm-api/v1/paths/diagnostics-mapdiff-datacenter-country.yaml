x-akamai:
  path-info: /diagnostics/mapdiff/domains/{domain}/datacenters/{datacenterId}/countries/{countryCode}
parameters:
- $ref: ../parameters/domain-path.yaml
- $ref: ../parameters/datacenter-id-path.yaml
- $ref: ../parameters/country-code-path.yaml
get:
  operationId: get-diagnostics-mapdiff-datacenter-country
  summary: Report detailed map diff diagnostics for a data center and country
  tags:
  - Diagnostics
  description: |
    Returns detailed geo and ping score time series for the given domain, datacenter, and country over the specified time period.
  parameters:
  - $ref: ../parameters/start-query.yaml
  - $ref: ../parameters/end-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-diagnostics-mapdiff-detailed-200.json
          schema:
            $ref: ../schemas/mapdiff-detailed-diagnostics.yaml
