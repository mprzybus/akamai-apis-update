x-akamai:
  path-info: /domain-list/accounts/{accountId}/contract-types/{contractTypeId}/domain-names
parameters:
- $ref: ../parameters/account-id-path.yaml
- $ref: ../parameters/contract-type-id-path.yaml
get:
  operationId: get-domain-names-for-account
  summary: List domain names for an account and contract type
  tags:
  - Domains
  description: |
    Returns a list of GTM domain names accessible to the current user for the given account and contract type.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-domain-names-200.json
          schema:
            $ref: ../schemas/domain-names.yaml
