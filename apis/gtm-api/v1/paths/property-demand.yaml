x-akamai:
  path-info: /demand/domains/{domain}/properties/{property}
parameters:
- $ref: ../parameters/property-path.yaml
- $ref: ../parameters/domain-path.yaml
get:
  operationId: get-demand-property
  summary: Report directed demand for a property
  tags:
  - Directed demand
  description: |
    The requests generated by the client machines behind a client name-server represent demand. This API returns a collection of reports containing the provisioned demand percentage, along with actual demand percentage seen by GTM rounded off to nearest 5 min interval for each data center. This API returns no data for load feedback-based domains, as those domains do not have a configured per data center load.
  parameters:
  - $ref: ../parameters/start-query.yaml
  - $ref: ../parameters/end-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-directed-demand-for-a-property-200.json
          schema:
            $ref: ../schemas/demand.yaml
        text/csv:
          example:
            $ref: ../examples/list-directed-demand-for-a-property-200.csv
          schema:
            type: string
