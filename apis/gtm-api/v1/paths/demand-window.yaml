x-akamai:
  path-info: /demand/domains/{domain}/properties/{property}/window
parameters:
- $ref: ../parameters/property-path.yaml
- $ref: ../parameters/domain-path.yaml
get:
  operationId: get-demand-window
  summary: Get a directed demand report window
  tags:
  - Directed demand
  description: |
    Returns the date range of data available for directed demand reports. Use the returned `start` and `end` values as the bounds for queries to the directed demand report endpoint.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-report-window-200.json
          schema:
            $ref: ../schemas/report-window.yaml
