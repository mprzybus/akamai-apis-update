type: object
description: |
  Collects context about the requested data based on the request's parameters.
additionalProperties: true
required:
- page
- pageSize
- sort
- totalResultsCount
- totalPageCount
properties:
  sort:
    type: array
    description: |
      The sorting property and the sorting direction for the result data.
    items:
      type: object
      additionalProperties: false
      required:
      - property
      - direction
      properties:
        direction:
          type: string
          description: |
            The sorting direction for the result data. Either `asc` for alphabetically ascending order or `desc` for alphabetically descending order.
          enum:
          - asc
          - desc
        property:
          type: string
          description: |
            The sorting property for the result data.
  page:
    type: integer
    description: |
      The number of the page.
  pageSize:
    type: integer
    description: |
      The number of records per page.
  totalPageCount:
    type: integer
    description: |
      The total number of pages.
  totalResultsCount:
    type: integer
    description: |
      The total number of records.
