x-akamai:
  file-path: paths/event.yaml
  path-info: /events/{eventId}
parameters:
- $ref: ../parameters/event-id-path.yaml
get:
  operationId: get-event
  summary: Get an event
  tags:
  - Events
  description: |
    Returns details of the specified event.
  responses:
    200:
      description: |
        Get an event.
      content:
        application/json:
          example:
            $ref: ../examples/event-200.json
          schema:
            $ref: ../schemas/event-200.yaml
    403:
      $ref: ../errors/403-cpcode.yaml
    404:
      $ref: ../errors/404.yaml
put:
  operationId: put-event
  summary: Update an event
  tags:
  - Events
  description: |
    Updates the specified event.
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/event-put.json
        schema:
          $ref: ../schemas/event-put.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/event-200.json
          schema:
            $ref: ../schemas/event-200.yaml
    400:
      $ref: ../errors/400-constraint.yaml
    403:
      $ref: ../errors/403-event.yaml
    404:
      $ref: ../errors/404.yaml
    409:
      $ref: ../errors/409-concurrency.yaml
delete:
  operationId: delete-event
  summary: Remove an event
  tags:
  - Events
  description: |
    Deletes the specified event.
  responses:
    204:
      description: |
        Event was removed successfully.
    403:
      $ref: ../errors/403-event.yaml
    404:
      $ref: ../errors/404.yaml
