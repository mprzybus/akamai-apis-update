type: object
description: |
  Simple error response with status and detail.
additionalProperties: true
properties:
  type:
    type: string
    description: Identifies each problem type.
  title:
    type: string
    description: Short, human-readable summary of the problem type.
  status:
    type: integer
    description: |
      The HTTP status code.
    minimum: 100
    maximum: 599
  detail:
    type: string
    description: |
      A human-readable explanation of the problem.
    minLength: 1
  instance:
    type: string
    description: A URI that identifies the specific occurrence of the problem.
required:
  - type
  - title
  - status
  - detail
  - instance