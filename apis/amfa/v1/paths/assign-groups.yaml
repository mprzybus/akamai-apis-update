x-akamai:
  path-info: /users/{userId}/assign-groups
parameters:
- $ref: ../parameters/user-id-path.yaml
post:
  operationId: post-assign-groups-to-user
  summary: Assign groups
  tags:
  - Groups
  description: |
    Assign a set of groups to a user account. With this operation you can modify the users' group assignment when their role in the organization changes. After you modify the users' group membership, you can manage their access to different integrations at group level.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/assign-groups-by-id-example.json
        schema:
          $ref: ../schemas/assign-groups.yaml
  responses:
    204:
      description: |
        The groups were successfully assigned to the user account.
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
