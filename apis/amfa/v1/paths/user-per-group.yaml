x-akamai:
  path-info: /groups/{groupId}/users/{userId}
parameters:
- $ref: ../parameters/group-id-path.yaml
- $ref: ../parameters/user-id-path.yaml
post:
  operationId: post-user-to-group
  summary: Add a user to a group
  tags:
  - Groups
  description: |
    Add a user to a group.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  responses:
    204:
      description: |
        User successfully added to the group.
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
delete:
  operationId: delete-user-from-group
  summary: Remove a user from a group
  tags:
  - Groups
  description: |
    Remove a user from a group.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  responses:
    204:
      description: |
        User successfully removed from the group.
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
