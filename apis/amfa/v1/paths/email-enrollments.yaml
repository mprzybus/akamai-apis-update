x-akamai:
  path-info: /email-enrollments
post:
  operationId: post-send-enrollment-email
  summary: Send enrollment email
  tags:
  - Email enrollments
  description: |
    Send enrollment email to a set of new users inviting them to Akamai MFA. This operation provides users with unique links to enroll and activate authentication devices in Akamai MFA.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/assign-users-by-id-example.json
        schema:
          $ref: ../schemas/assign-users.yaml
  responses:
    200:
      description: |
        The enrollment email was successfully sent to the users.
      content:
        application/json:
          example:
            $ref: ../examples/assign-users-by-id-example.json
          schema:
            $ref: ../schemas/assign-users.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    500:
      $ref: ../errors/500.yaml
