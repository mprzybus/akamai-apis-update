x-akamai:
  path-info: /groups/{groupId}
parameters:
- $ref: ../parameters/group-id-path.yaml
get:
  operationId: get-group
  summary: Get a group
  tags:
  - Groups
  description: |
    Retrieve a group's details.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  responses:
    200:
      description: |
        The response provides the group's details.
      content:
        application/json:
          example:
            $ref: ../examples/group-get-200.json
          schema:
            $ref: ../schemas/group-detail.yaml
    401:
      $ref: ../errors/401.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
delete:
  operationId: delete-group
  summary: Delete a group
  tags:
  - Groups
  description: |
    Permanently delete a group.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  responses:
    204:
      description: |
        Group successfully deleted.      
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
