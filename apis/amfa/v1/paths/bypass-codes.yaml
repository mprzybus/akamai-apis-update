x-akamai:
  path-info: /users/{userId}/bypass-codes
parameters:
- $ref: ../parameters/user-id-path.yaml
post:
  operationId: post-bypass-code
  summary: Create a bypass code
  tags:
  - Bypass codes
  description: |
    Generate a new bypass code for a specific user account.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/bypass-code-post-201.json
        schema:
          $ref: ../schemas/bypass-code-create.yaml
  responses:
    201:
      description: |
        The operation provides data for a newly created bypass code.
      headers:
        Location:
          $ref: ../headers/location.yaml
      content:
        application/json:
          example:
            $ref: ../examples/bypass-code-get-200.json
          schema:
            $ref: ../schemas/bypass-code-get-200.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
get:
  operationId: get-bypass-codes
  summary: List bypass codes
  tags:
  - Bypass codes
  description: |
    List all the bypass codes generated for a specific user account.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  responses:
    200:
      description: |
        The response provides a list of bypass codes.
      content:
        application/json:
          example:
            $ref: ../examples/bypass-codes-get-200.json
          schema:
            $ref: ../schemas/bypass-codes.yaml
    401:
      $ref: ../errors/401.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
