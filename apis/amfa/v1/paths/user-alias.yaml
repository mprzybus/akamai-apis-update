x-akamai:
  path-info: /users/{userId}/aliases/{userAliasId}
parameters:
- $ref: ../parameters/user-id-path.yaml
- $ref: ../parameters/user-alias-id-path.yaml
delete:
  operationId: delete-user-alias
  summary: Delete an alias assigned to a user
  tags:
  - User aliases
  description: |
    Permanently delete a user's alias.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  responses:
    204:
      description: |
        Alias successfully deleted.
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
