x-akamai:
  path-info: /users/{userId}/devices/{deviceId}/disable
parameters:
- $ref: ../parameters/user-id-path.yaml
- $ref: ../parameters/device-id-path.yaml
post:
  operationId: post-disable-user-device
  summary: Disable a device
  tags:
  - Devices
  description: |
    Deactivate the user's authentication device.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  responses:
    200:
      description: |
        The user's authentication device was successfully disabled.
      content:
        application/json:
          example:
            $ref: ../examples/device-get-200.json
          schema:
            $ref: ../schemas/device.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
