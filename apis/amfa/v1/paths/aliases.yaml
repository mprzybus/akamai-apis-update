x-akamai:
  path-info: /users/{userId}/aliases
parameters:
- $ref: ../parameters/user-id-path.yaml
post:
  operationId: post-alias-to-user
  summary: Add an alias to a user
  tags:
  - User aliases
  description: |
    Add an alternative username for a user.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/alias-post-request.json
        schema:
          $ref: ../schemas/add-user-alias.yaml
  responses:
    200:
      description: |
        Alias successfully created.
      content:
        application/json:
          example:
            $ref: ../examples/alias-post-response-200.json
          schema:
            $ref: ../schemas/user-alias.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    500:
      $ref: ../errors/500.yaml
