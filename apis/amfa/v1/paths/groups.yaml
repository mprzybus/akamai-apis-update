x-akamai:
  path-info: /groups
post:
  operationId: post-group
  summary: Add a group
  tags:
  - Groups
  description: |
    Create a new group.
  parameters:
  - $ref: ../parameters/contract-id-required.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/groups-post-request.json
        schema:
          $ref: ../schemas/add-group-request.yaml
  responses:
    200:
      description: |
        Group successfully created.
      content:
        application/json:
          example:
            $ref: ../examples/group-get-200.json
          schema:
            $ref: ../schemas/group-detail.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    500:
      $ref: ../errors/500.yaml
get:
  operationId: get-groups
  summary: List groups
  tags:
  - Groups
  description: |
    List groups configured in Akamai MFA, optionally filtered and paginated.
  parameters:
  - $ref: ../parameters/page-query.yaml
  - $ref: ../parameters/page-size-query.yaml
  - $ref: ../parameters/contract-id-required.yaml
  responses:
    200:
      description: |
        The response lists available groups.
      content:
        application/json:
          example:
            $ref: ../examples/groups-get-200.json
          schema:
            $ref: ../schemas/groups-get-200.yaml
    401:
      $ref: ../errors/401.yaml
    500:
      $ref: ../errors/500.yaml
