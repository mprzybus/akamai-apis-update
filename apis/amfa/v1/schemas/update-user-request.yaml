type: object
description: |
  Update user request JSON.
additionalProperties: false
required:
- firstName
- lastName
- email
- username
properties:
  firstName:
    type: string
    description: |
      The user's first name.
    minLength: 1
  lastName:
    type: string
    description: |
      The user's last name.
    minLength: 1
  email:
    type: string
    description: |
      The user's email address.
    minLength: 1
  username:
    description: |
      The user's username. The username is unique for the tenant.
    $ref: common-definitions.yaml#/definitions/nonEmptyString
