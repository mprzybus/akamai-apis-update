definitions:
  type:
    type: string
    description: |
      The type of the authentication device. Refer to [API concepts](ref:mfa-concepts) to learn about device types.
    enum:
    - AKAMAI_AUTHENTICATOR
    - BYPASS_CODE
    - EMAIL_ADDRESS
    - GENERIC_WEBAUTHN
    - HARDWARE_TOKEN
    - PASSKEY
    - PHONE_NUMBER
    - PLATFORM_AUTHENTICATOR
    - REMEMBER_CLIENT
    - SECURITY_KEY
    - THIRD_PARTY_AUTHENTICATOR
