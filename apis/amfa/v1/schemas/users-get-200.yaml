type: object
description: |
  Provides response data with a list of user accounts configured in Akamai MFA.
additionalProperties: false
required:
- users
- totalPages
- totalItems
properties:
  users:
    type: array
    description: |
      A paged list of user accounts configured in Akamai MFA.
    minItems: 0
    items:
      $ref: user-detail.yaml
  page:
    type: integer
    description: |
      The currently displayed page.
    minimum: 1
  totalPages:
    type: integer
    description: |
      The number of user accounts displayed on each page.
    minimum: 0
  totalItems:
    type: integer
    description: |
      The total number of user accounts matching the entered query.
    minimum: 0
