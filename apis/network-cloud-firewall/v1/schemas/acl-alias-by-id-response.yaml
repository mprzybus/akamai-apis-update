required:
- aliasId
- accountId
- aliasName
- aliasListType
- ipVersion
- entriesCount
- createdBy
- createdTimestamp
- updatedBy
- updatedTimestamp
- hasCountryCodes
- hasAsns
- isCustomerEditable
- enabled
type: object
description: |
  Created or updated account alias.
additionalProperties: false
properties:
  aliasId:
    minimum: 1
    type: integer
    description: |
      Unique identifier of the alias.
  accountId:
    minLength: 1
    type: string
    description: |
      The account ID.
  aliasName:
    minLength: 1
    type: string
    description: |
      The alias name. Alias name needs to be unique to an account. An alias name needs to start with a lowercase letter and can't have any uppercase letters. Allowed characters are letters, numbers, dashes, and underscores.
  aliasListType:
    type: string
    description: |
      Alias list type. Either `SOURCE`, less than 50 source IP entries, `BIG`, 50 or more source IP entries, or `DIPA`, fewer than 50 destination IP entries.
    enum:
    - SOURCE
    - BIG
    - DIPA
  ipVersion:
    type: string
    description: |
      The IP version, either `V4` or `V6`.
    enum:
    - V4
    - V6
  entries:
    minItems: 0
    type: array
    description: |
      Entries within the alias. Only allowed values are IP subnets belonging to the account and ISO standard country codes. If a subnet mask isn't included, defaults /32 for IPv4 or /128 for IPv6.
    items:
      minLength: 1
      type: string
  entriesCount:
    minimum: 0
    type: integer
    description: |
      Number of entries within the alias.
  createdBy:
    minLength: 1
    type: string
    description: |
      User who created the alias.
  createdTimestamp:
    minLength: 1
    type: string
    description: |
      ISO 8601 timestamp marking when the alias was created.
  updatedBy:
    minLength: 1
    type: string
    description: |
      User who last updated the alias.
  updatedTimestamp:
    minLength: 1
    type: string
    description: |
      ISO 8601 timestamp marking the alias' last update.
  hasCountryCodes:
    type: boolean
    description: |
      Whether the account alias contains ISO country codes.
  hasAsns:
    type:  boolean
    description: |
      Whether the account alias contains AS numbers.
  isCustomerEditable:
    type: boolean
    description: |
      Whether you can edit an account alias.
  enabled:
    type: boolean
    description: |
      Enables the account alias.
