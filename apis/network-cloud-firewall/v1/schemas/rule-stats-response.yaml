required:
- rulesetName
- rulesetType
- rules
type: object
description: |
  Rule statistics per rule set.
additionalProperties: false
properties:
  rulesetName:
    minLength: 1
    type: string
    description: |
      The rule set name.
  rulesetType:
    minLength: 1
    type: string
    description: |
      The rule set type. 
  rules:
    minItems: 0
    type: array
    description: |
      The rules in the rule set.
    items:
      required:
      - ruleId
      - matches
      - bytes
      - lastUpdated
      - firstMatch
      - lastMatch
      type: object
      additionalProperties: false
      properties:
        ruleId:
          minLength: 1
          type: string
          description: |
            The rule ID.
        matches:
          minimum: 0
          type: integer
          description: |
            The number of rule matches.
        bytes:
          minimum: 0
          type: integer
          description: |
            The rule size in bytes.
        lastUpdated:
          minLength: 1
          type: string
          description: |
            The time rule match statistics last changed, including match receipt, aggregation, and manual statistics resets.
        firstMatch:
          minLength: 1
          type: string
          description: |
            The first rule match.
        lastMatch:
          minLength: 1
          type: string
          description: |
            The last rule match.
        lastReset:
          type: string
          minLength: 1
          description: |
            The last time the rule statistics were reset.
