type: object
description: |
  Rule statistics by rule ID.
additionalProperties: false
properties:
  ruleId:
    type: string
    description: |
      The rule ID.
  matches:
    type: integer
    minimum: 0
    description: |
      The number of rule matches.
  bytes:
    type: integer
    minimum: 0
    description: |
      The rule size in bytes.
  lastUpdated:
    type: string
    description: |
      The time rule match statistics last changed, including match receipt, aggregation, and manual statistics resets.
  firstMatch:
    type: string
    description: |
      The first rule match.
  lastMatch:
    type: string
    description: |
      The last rule match.
  lastReset:
    type: string
    minLength: 1
    description: |
      The last time the rule statistics were reset.
  
