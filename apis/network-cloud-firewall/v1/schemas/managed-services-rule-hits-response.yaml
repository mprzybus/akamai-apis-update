
type: object
required:
  - policyDomain
  - rules
additionalProperties: false
properties:
  policyDomain:
    type: string
    minLength: 1
    description: |
      Policy domain name.
  rules:
    type: array
    description: |
      Managed Services ACL rule set matches.
    items:
      type: object
      additionalProperties: false
      required:
        - ruleUuid
        - matches
        - bytes
        - lastUpdated
        - firstMatch
        - lastMatch
        - lastReset
      properties:
        ruleUuid:
          type: string
          minLength: 1
          description: |
            Unique rule ID.
        matches:
          minimum: 0
          type: integer
          description: |
            The number of rule matches.
        bytes:
          minimum: 0
          type: integer
          description: |
            The rule size in bytes.
        lastUpdated:
          minLength: 1
          type: string
          description: |
            The time rule match statistics last changed, including match receipt, aggregation, and manual statistics resets.
        firstMatch:
          minLength: 1
          type: string
          description: |
            The first rule match.
        lastMatch:
          minLength: 1
          type: string
          description: |
            The last rule match.
        lastReset:
          type: string
          minLength: 1
          description: |
            The last time the rule statistics were reset.
