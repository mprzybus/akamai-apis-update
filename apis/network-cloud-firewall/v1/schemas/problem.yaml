type: object
description: |
  Represents error data.
additionalProperties: true
required:
- errorCode
properties:
  status:
    type: integer
    description: |
      The error's HTTP response code.
    minimum: 100
    maximum: 600
  message:
    type: string
    description: |
      Diagnostic instructions to locate and fix the problem.
    minLength: 1
  data:
    description: |
      The customer request data related to the error.
    type: string
  errorCode:
    minLength: 1
    type: string
    description: |
      A short description of the error.
  args:
    minItems: 0
    nullable: true
    type: array
    description: |
      The request properties related to the error.
    items:
      anyOf:
      - title: Strings
        type: string
      - title: Integer
        type: integer
      - title: Array
        type: array
        items:
          anyOf:
          - title: String
            type: string
          - title: Numeric
            type: integer
