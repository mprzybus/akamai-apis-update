required:
  - policyDomain
  - version
  - state
  - createdBy
  - createdTimestamp
  - updatedBy
  - updatedTimestamp
  - ruleSet
type: object
description: |
  Managed Services ACL version and rule set data.
additionalProperties: false
properties:
  policyDomain:
    minLength: 1
    type: string
    description: |
      Policy domain name.
  version:
    minimum: 1
    type: integer
    description: |
      Version number.
  state:
    type: string
    description: |
      ACL version state. Either `CONFIGURATION`, `DEPLOYED`, or `DEPRECATED`.
    enum:
      - CONFIGURATION
      - DEPLOYED
      - DEPRECATED
  createdBy:
    minLength: 1
    type: string
    description: |
      User who created the version.
  createdTimestamp:
    minLength: 1
    type: string
    description: |
      ISO 8601 timestamp of the ACL's creation.
  updatedBy:
    minLength: 1
    type: string
    description: |
      User who last updated the version.
    nullable: true
  updatedTimestamp:
    minLength: 1
    type: string
    description: |
      ISO 8601 timestamp of the ACL's last update.
    nullable: true
  ruleSet:
    minItems: 0
    type: array
    description: |
      The rules within the Managed Services ACL rule set.
    items:
      required:
        - ruleUuid
        - index
        - ipVersion
        - anyDestination
        - destination
        - aclText
        - locations
      type: object
      additionalProperties: false
      properties:
        ruleUuid:
          minLength: 1
          type: string
          description: |
            Unique rule ID.
        index:
          minimum: 1
          type: integer
          description: |
            Rule order.
        ipVersion:
          type: string
          description: |
            IP version, either `V4` or `V6`.
          enum:
            - V4
            - V6
        anyDestination:
          type: boolean
          description: |
            Whether the rule applies to an `any` destination.
        destination:
          minLength: 1
          type: string
          description: |
            Destination IP/CIDR when `anyDestination` is false.
        aclText:
          minLength: 1
          type: string
          description: |
            ACL rule text.
        locations:
          type: array
          description: |
            Scrubbing center locations. If empty, applies to all locations. 
          items:
            minLength: 0
            type: string