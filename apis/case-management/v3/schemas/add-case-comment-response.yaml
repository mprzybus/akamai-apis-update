type: object
description: |
  Collects details about the comment added to the case.
additionalProperties: false
properties:
  commentId:
    type: string
    description: |
      Identifier for each case.
  comment:
    type: string
    description: |
      Comment content.
  commentType:
    type: string
    description: |
      Type of comment. The only supported value is `WEB_UPDATE`.
    enum:
    - WEB_UPDATE
  createdBy:
    type: string
    description: |
      Name of the commenter.
  createdDate:
    type: string
    description: |
      ISO 8601 timestamp indicating when the comment was added.
    format: date-time
  links:
    $ref: hypermedia.yaml
