type: object
description: |
  Provides details about attachments added to the case.
additionalProperties: false
properties:
  attachments:
    type: array
    description: |
      Collects details about added attachments.
    items:
      type: object
      description: |
        Attachment details.
      additionalProperties: false
      properties:
        fileName:
          type: string
          description: |
            Name of the attachment.
        fileType:
          type: string
          description: |
            Type of the attachment.
        createdBy:
          type: string
          description: |
            Name of the creator of the attachment.
        createdDate:
          type: string
          description: |
            ISO 8601 timestamp indicating when the attachment was added.
          format: date-time
        attachmentId:
          type: string
          description: |
            Identifier for the attachment.
        links:
          $ref: hypermedia.yaml
  links:
    $ref: hypermedia.yaml
