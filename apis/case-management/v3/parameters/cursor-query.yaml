name: cursor
in: query
description: |
  Cursor value for pagination. It occurs only if there's a `next` page of the results.
examples:
  cases:
    summary: Sample cursor value for navigating to the next set of paginated cases
    value: F-CS-0000002
  comments:
    summary: Sample cursor value for navigating to the next set of paginated comments
    value: F-CS-0003
  attachments:
    summary: Sample cursor value for navigating to the next set of paginated attachments
    value: 0690f000001y2ut
schema:
  type: string
