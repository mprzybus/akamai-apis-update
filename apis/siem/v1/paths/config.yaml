x-akamai:
  path-info: /configs/{configId}
parameters:
- $ref: ../parameters/config-id-path.yaml
get:
  operationId: get-config
  summary: Fetch security events
  tags:
  - Events
  description: |
    Get security events data from your security configurations using one of two modes: [offset or time-based](ref:query-parameter-combinations). Each mode orders event logs based on the logs' storage time in the database, not the time when the events actually occurred. This may result in delayed event logs in subsequent offset requests, or older event logs in time-based requests. While both methods have a 5-second latency, using `offset` allows subsequent calls to return logs for the 5 seconds omitted from the previous request. The time-based method omits logs from that 5 seconds of latency, so you may miss some logs from that period.

     If the connection is disrupted, use time-based mode to replay security events that occurred in the last 12 hours up to 5 seconds before your requested time range. Use `offset` and `limit` parameters in offset mode. Use `from`, `to`, and `limit` parameters in time-based mode. The potentially large response contains a series of JSON objects, each separated with a line break and each corresponding to a security event. The last line of the response is an [offset context](ref:offsetcontext) object that provides `total` records fetched, an `offset` to use a starting point for the next batch of data, and any `limit` you specified. Run this operation continuously as long as it returns new logs to ensure you don't miss any. The API may return a maximum of 600,000 logs per request, while your configurations might generate many more in periods of high traffic.
  x-akamai:
    supports-account-switch-key: false
  parameters:
  - $ref: ../parameters/offset-query.yaml
  - $ref: ../parameters/limit-query.yaml
  - $ref: ../parameters/from-query.yaml
  - $ref: ../parameters/to-query.yaml
  responses:
    200:
      description: |
        The response lists security events.
      content:
        application/json:
          examples:
            01-event-lines:
              summary: Event lines
              value:
                $ref: ../examples/siem-event-200.json
            02-summary:
              summary: Final metadata line
              value:
                $ref: ../examples/siem-response-context.json
          schema:
            $ref: ../schemas/streamed-response-200.yaml
    400:
      $ref: ../errors/400.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    416:
      $ref: ../errors/416.yaml
    429:
      $ref: ../errors/429.yaml
    500:
      $ref: ../errors/500.yaml
    503:
      $ref: ../errors/503.yaml
