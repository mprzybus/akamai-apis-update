type: object
properties:
  policyDomainName:
    type: string
  pdId:
    type: integer
  vipsLimit:
    type: integer
  portsLimit:
    type: integer
  createdBy:
    type: string
  createdTimestamp:
    type: string
    format: date-time
  updatedBy:
    type: string
    nullable: true
  updatedTimestamp:
    type: string
    format: date-time
  configVersions:
    type: array
    items:
      type: object
      properties:
        version:
          type: integer
        configVersionId:
          type: integer
        ipsAllocated:
          type: integer
        ipsConfigured:
          type: integer
        status:
          type: string
