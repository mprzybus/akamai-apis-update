x-akamai:
  file-path: paths/rule-tags.yaml
  path-info: /device-posture/risk-assessment/tags/{ruleId}
parameters:
- $ref: ../parameters/rule-id-path.yaml
get:
  operationId: get-tag
  summary: Get a risk tag
  tags:
  - Risk assessment
  description: |
    Lists details for a specific risk tag.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-risk-assessment-tag-200.json
          schema:
            $ref: ../schemas/risk-rule.yaml
put:
  operationId: put-tag
  summary: Modify a risk tag
  tags:
  - Risk assessment
  description: |
    Updates the details for a specific risk tag.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/get-risk-assessment-tag-200.json
        schema:
          $ref: ../schemas/risk-rule.yaml
  responses:
    200:
      description: |
        Successful response.
delete:
  operationId: delete-tag
  summary: Delete a tag
  tags:
  - Risk assessment
  description: |
    Removes a risk tag from your device posture configuration.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
