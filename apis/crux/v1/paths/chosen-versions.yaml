x-akamai:
  file-path: paths/chosen-versions.yaml
  path-info: /device-posture/risk-assessment/chosen-versions
get:
  operationId: get-chosen-versions
  summary: List chosen versions
  tags:
  - Risk assessment
  description: |
    Lists the chosen versions of different risk assessment dimensions.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-risk-assessment-chosen-versions-200.json
          schema:
            $ref: ../schemas/chosen-versions.yaml
put:
  operationId: put-chosen-versions
  summary: Modify chosen versions
  tags:
  - Risk assessment
  description: |
    Updates the chosen versions selection of different risk assessment dimensions.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/list-risk-assessment-chosen-versions-200.json
        schema:
          $ref: ../schemas/chosen-versions.yaml
  responses:
    200:
      description: |
        Successful response.
