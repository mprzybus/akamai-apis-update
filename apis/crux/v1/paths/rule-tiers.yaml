x-akamai:
  file-path: paths/rule-tiers.yaml
  path-info: /device-posture/risk-assessment/tiers/{ruleId}
parameters:
- $ref: ../parameters/rule-id-path.yaml
get:
  operationId: get-tier
  summary: Get a risk tier
  tags:
  - Risk assessment
  description: |
    Lists details for a specific risk tier.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-risk-assessment-tier-200.json
          schema:
            $ref: ../schemas/risk-rule.yaml
put:
  operationId: put-tier
  summary: Modify risk tier
  tags:
  - Risk assessment
  description: |
    Updates details for a specific risk tier.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/get-risk-assessment-tier-200.json
        schema:
          $ref: ../schemas/risk-rule.yaml
  responses:
    200:
      description: |
        Successful response.
