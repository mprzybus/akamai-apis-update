x-akamai:
  file-path: paths/client-version.yaml
  path-info: /device-posture/risk-assessment/versions/client_version
get:
  operationId: get-client-version
  summary: List client versions
  tags:
  - Risk assessment
  description: |
    Lists supported client versions for risk assessment. Risk assessment doesn't support unlisted client versions.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-risk-assessment-available-os-ver-200.json
          schema:
            $ref: ../schemas/client-versions.yaml
