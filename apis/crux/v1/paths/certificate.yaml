x-akamai:
  file-path: paths/certificate.yaml
  path-info: /mgmt-pop/certificates/{certificateId}
parameters:
- $ref: ../parameters/certificate-id-path.yaml
get:
  operationId: get-certificate
  summary: Get a certificate
  tags:
  - Certificates
  description: |
    Retrieves a single certificate by ID.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/certificate-post-body-200-file.json
          schema:
            $ref: ../schemas/certificate-post.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    415:
      $ref: ../errors/415.yaml
put:
  operationId: put-certificate
  summary: Modify a manual certificate
  tags:
  - Certificates
  description: |
    Updates an existing manual certificate.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/certificate-put-body.json
        schema:
          $ref: ../schemas/certificate-put.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/certificate-put-200.json
          schema:
            $ref: ../schemas/certificate-post.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    415:
      $ref: ../errors/415.yaml
delete:
  operationId: delete-certificate
  summary: Delete a certificate
  tags:
  - Certificates
  description: |
    Removes an existing certificate.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    204:
      description: |
        Successful response.
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    415:
      $ref: ../errors/415.yaml
