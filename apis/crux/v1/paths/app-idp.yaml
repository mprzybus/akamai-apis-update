x-akamai:
  file-path: paths/app-idp.yaml
  path-info: /mgmt-pop/appidp/{appIdpId}
parameters:
- $ref: ../parameters/app-idp-id-path.yaml
get:
  operationId: get-app-idp
  summary: Get an application IDP
  tags:
  - Application IDPs
  description: |
    Get details for a specific application IDP.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-app-idp-200.json
          schema:
            $ref: ../schemas/app-idp.yaml
delete:
  operationId: delete-app-idp
  summary: Delete an application IDP
  tags:
  - Application IDPs
  description: |
    Removes the IDP assigned to your application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    204:
      description: |
        Successful response.
