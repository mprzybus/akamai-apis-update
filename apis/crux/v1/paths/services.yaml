x-akamai:
  file-path: paths/services.yaml
  path-info: /mgmt-pop/services
post:
  operationId: post-rule
  summary: Create a rule
  tags:
  - Rules
  description: |
    Creates a new rule.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-rules-body.json
        schema:
          $ref: ../schemas/rules-post.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/create-rules-200.json
          schema:
            $ref: ../schemas/rules-post.yaml
get:
  operationId: get-rules
  summary: List rules
  tags:
  - Rules
  description: |
    Lists rules.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-rules-200.json
          schema:
            $ref: ../schemas/rules-list.yaml
