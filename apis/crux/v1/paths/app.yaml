x-akamai:
  file-path: paths/app.yaml
  path-info: /mgmt-pop/apps/{applicationId}
parameters:
- $ref: ../parameters/application-id-path.yaml
get:
  operationId: get-app
  summary: Get an application
  tags:
  - Applications
  description: |
    Lists a specified application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/expand-sdk-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-application-200.json
          schema:
            $ref: ../schemas/application.yaml
put:
  operationId: put-app
  summary: Modify an application
  tags:
  - Applications
  description: |
    Updates the details of an application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/modify-an-application-200.json
        schema:
          $ref: ../schemas/application.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/modify-an-application-200.json
          schema:
            $ref: ../schemas/application.yaml
delete:
  operationId: delete-app
  summary: Delete an application
  tags:
  - Applications
  description: |
    Removes an application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    204:
      description: |
        Successful response.
