x-akamai:
  file-path: paths/app-categories.yaml
  path-info: /mgmt-pop/appcategories
post:
  operationId: post-app-category
  summary: Create an application category
  tags:
  - Application categories
  description: |
    Create a new application category.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-an-app-category-body.json
        schema:
          $ref: ../schemas/create-app-category.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-app-category-200.json
          schema:
            $ref: ../schemas/app-category.yaml
get:
  operationId: get-app-categories
  summary: List application categories
  tags:
  - Application categories
  description: |
    Lists your application categories.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-app-categories-200.json
          schema:
            $ref: ../schemas/app-categories.yaml
