x-akamai:
  file-path: paths/location.yaml
  path-info: /mgmt-pop/apps/{applicationId}/urllocation/{locationId}
parameters:
- $ref: ../parameters/location-id-path.yaml
- $ref: ../parameters/application-id-path.yaml
get:
  operationId: get-app-urllocation
  summary: Get a URL location rule
  tags:
  - URL location rules
  description: |
    Gets the URL location rule for an application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-app-urllocation-200.json
          schema:
            $ref: ../schemas/get-urllocation.yaml
put:
  operationId: put-app-urllocation
  summary: Modify a URL location rule
  tags:
  - URL location rules
  description: |
    Edits a URL location rule.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/modify-a-urllocation-body.json
        schema:
          $ref: ../schemas/get-urllocation.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/modify-a-urllocation-200.json
          schema:
            $ref: ../schemas/get-urllocation.yaml
delete:
  operationId: delete-app-urllocation
  summary: Delete a URL location rule
  tags:
  - URL location rules
  description: |
    Removes a URL location rule.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    204:
      description: |
        Successful response.
