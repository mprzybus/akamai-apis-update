x-akamai:
  file-path: paths/create-users.yaml
  path-info: /mgmt-pop/directories/{directory_id}/createusers
parameters:
- $ref: ../parameters/directory-id-path.yaml
post:
  operationId: post-users
  summary: Bulk create users
  tags:
  - User administration
  description: |
    Creates users in bulk for a cloud directory using a CSV.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/x-www-form-urlencoded:
        example:
          $ref: ../examples/bulk-user-import.csv
        schema:
          type: string
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/create-bulk-user-200.json
          schema:
            $ref: ../schemas/cmdid.yaml
