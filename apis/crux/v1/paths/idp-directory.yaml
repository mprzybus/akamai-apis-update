x-akamai:
  file-path: paths/idp-directory.yaml
  path-info: /mgmt-pop/idpdirectory/{idpdirectory_id}
parameters:
- $ref: ../parameters/idpdirectory-id-path.yaml
get:
  operationId: get-idp-directory
  summary: Get an IDP directory
  tags:
  - IDP directories
  description: |
    Gets the specified IDP directory.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful operation.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-idpdirectory-200.json
          schema:
            $ref: ../schemas/idpdirectory.yaml
put:
  operationId: put-idp-directory
  summary: Modify an IDP directory
  tags:
  - IDP directories
  description: |
    Updates an existing IDP directory.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/put-idpdirectory-body.json
        schema:
          $ref: ../schemas/idpdirectory.yaml
  responses:
    200:
      description: |
        Successful operation.
      content:
        application/json:
          example:
            $ref: ../examples/put-idpdirectory-200.json
          schema:
            $ref: ../schemas/idpdirectory.yaml
delete:
  operationId: delete-idp-directory
  summary: Delete an IDP directory
  tags:
  - IDP directories
  description: |
    Deletes an existing IDP directory.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    204:
      description: |
        Successful operation.
