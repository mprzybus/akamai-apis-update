x-akamai:
  file-path: paths/idp-directories.yaml
  path-info: /mgmt-pop/idpdirectory
post:
  operationId: post-idp-directory
  summary: Create an IDP directory
  tags:
  - IDP directories
  description: |
    Creates a new IDP directory.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-idpdirectory-body.json
        schema:
          $ref: ../schemas/idpdirectory.yaml
  responses:
    200:
      description: |
        Successful operation.
      content:
        application/json:
          example:
            $ref: ../examples/create-idpdirectory-200.json
          schema:
            $ref: ../schemas/create-idpdirectory-200.yaml
get:
  operationId: get-idp-directories
  summary: List IDP directories
  tags:
  - IDP directories
  description: |
    Lists IDP directories.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful operation.
      content:
        application/json:
          example:
            $ref: ../examples/list-idp-directory-200.json
          schema:
            $ref: ../schemas/idpdirectories.yaml
