x-akamai:
  file-path: paths/status-crowdstrike.yaml
  path-info: /device-posture/risk-assessment/partner/crowdstrike/status
get:
  operationId: get-partner-crowdstrike-status
  summary: Get CrowdStrike integration status
  tags:
  - Risk assessment
  description: |
    Get current status of CrowdStrike integration.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/put-risk-assessment-partner-crowdstrike-carbon-black-status-200.json
          schema:
            $ref: ../schemas/partner-integration-status.yaml
put:
  operationId: put-partner-crowdstrike-status
  summary: Update CrowdStrike integration status
  tags:
  - Risk assessment
  description: |
    Updates current status of CrowdStrike integration to either enabled or disabled.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/put-risk-assessment-partner-crowdstrike-carbon-black-status-200.json
        schema:
          $ref: ../schemas/partner-integration-status.yaml
  responses:
    200:
      description: |
        Successful response.
