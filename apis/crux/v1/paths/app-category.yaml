x-akamai:
  file-path: paths/app-category.yaml
  path-info: /mgmt-pop/appcategories/{appCategoryId}
parameters:
- $ref: ../parameters/app-category-id-path.yaml
get:
  operationId: get-app-category
  summary: Get an application category
  tags:
  - Application categories
  description: |
    Lists details for a specific application category.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-app-category-200.json
          schema:
            $ref: ../schemas/app-category.yaml
put:
  operationId: put-app-category
  summary: Modify an application category
  tags:
  - Application categories
  description: |
    Modifies an existing application category.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/modify-an-app-category-body.json
        schema:
          $ref: ../schemas/modify-app-category.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-app-category-200.json
          schema:
            $ref: ../schemas/app-category.yaml
delete:
  operationId: delete-app-category
  summary: Delete an application category
  tags:
  - Application categories
  description: |
    Removes an application category from your Enterprise Application Access product.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/delete-an-app-category-200.json
          schema:
            $ref: ../schemas/message.yaml
