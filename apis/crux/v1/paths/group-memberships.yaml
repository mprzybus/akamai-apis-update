x-akamai:
  file-path: paths/group-memberships.yaml
  path-info: /mgmt-pop/groupmembership
post:
  operationId: post-group-membership
  summary: Create a directory group membership
  tags:
  - Directory group membership
  description: |
    Creates a new directory group membership.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/post-bulk-user-body.json
        schema:
          $ref: ../schemas/bulk-add-user-request.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/post-bulk-user-200.json
          schema:
            $ref: ../schemas/bulk-add-user-response.yaml
get:
  operationId: get-group-memberships
  summary: List directory group memberships
  tags:
  - Directory group membership
  description: |
    Lists directory group memberships.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-group-membership-200.json
          schema:
            $ref: ../schemas/groupmemberships.yaml
