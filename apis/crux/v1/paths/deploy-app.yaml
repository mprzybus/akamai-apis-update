x-akamai:
  file-path: paths/deploy-app.yaml
  path-info: /mgmt-pop/apps/{applicationId}/deploy
parameters:
- $ref: ../parameters/application-id-path.yaml
post:
  operationId: post-app-deploy
  summary: Deploy an application
  tags:
  - Applications
  description: |
    Deploys an application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/deploy-app-comment.json
        schema:
          $ref: ../schemas/deploy-app-comment.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/deploy-application-200.json
          schema:
            $ref: ../schemas/deploy-app.yaml
