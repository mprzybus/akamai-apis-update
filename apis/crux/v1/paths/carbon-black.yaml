x-akamai:
  file-path: paths/carbon-black.yaml
  path-info: /device-posture/risk-assessment/partner/carbon-black
post:
  operationId: post-partner-carbon-black
  summary: Create a new Carbon Black integration
  tags:
  - Risk assessment
  description: |
    Adds a new Carbon Black integration.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/post-risk-assessment-partner-carbon-black-200.json
        schema:
          $ref: ../schemas/carbon-black-integration.yaml
  responses:
    200:
      description: |
        Successful response.
get:
  operationId: get-partner-carbon-black
  summary: List Carbon Black integrations
  tags:
  - Risk assessment
  description: |
    Lists the details of existing Carbon Black integration entries.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-risk-assessment-partner-carbon-black-200.json
          schema:
            $ref: ../schemas/carbon-black-get-integrations.yaml
