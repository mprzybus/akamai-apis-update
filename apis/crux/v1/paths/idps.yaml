x-akamai:
  file-path: paths/idps.yaml
  path-info: /mgmt-pop/idp
post:
  operationId: post-idp
  summary: Create an IDP
  tags:
  - IDPs
  description: |
    Creates a new IDP.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-an-idp-body.json
        schema:
          $ref: ../schemas/idp.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/create-an-idp-body-200.json
          schema:
            $ref: ../schemas/idp-create-put-response.yaml
get:
  operationId: get-idps
  summary: List IDPs
  tags:
  - IDPs
  description: |
    Lists IDPs.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-idp-list-body-200.json
          schema:
            $ref: ../schemas/idp-list.yaml
