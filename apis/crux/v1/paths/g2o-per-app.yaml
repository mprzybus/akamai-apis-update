x-akamai:
  file-path: paths/g2o-per-app.yaml
  path-info: /mgmt-pop/apps/{applicationId}/g2o
parameters:
- $ref: ../parameters/application-id-path.yaml
post:
  operationId: post-app-g2o
  summary: Create a Ghost to Origin key
  tags:
  - Ghost to Origin
  description: |
    Enables a G2O configuration for an application. Used only if you've enabled [Akamai Edge Enforcement](https://techdocs.akamai.com/eaa/docs/setup-advanced-settings-app).
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/create-g2o-credentials-200.json
          schema:
            $ref: ../schemas/g2o.yaml
