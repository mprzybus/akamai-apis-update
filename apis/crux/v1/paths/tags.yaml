x-akamai:
  file-path: paths/tags.yaml
  path-info: /device-posture/risk-assessment/tags
post:
  operationId: post-tag
  summary: Create risk tag
  tags:
  - Risk assessment
  description: |
    Creates a new risk tag.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/get-risk-assessment-tag-200.json
        schema:
          $ref: ../schemas/risk-rule.yaml
  responses:
    201:
      description: |
        Successful response.
      headers:
        Location:
          $ref: ../headers/location-header.yaml
get:
  operationId: get-tags
  summary: List risk tags
  tags:
  - Risk assessment
  description: |
    Lists supported risk tags for risk assessment.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-risk-assessment-tags-200.json
          schema:
            $ref: ../schemas/risk-rules.yaml
