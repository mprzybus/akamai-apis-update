x-akamai:
  file-path: paths/apps.yaml
  path-info: /mgmt-pop/apps
post:
  operationId: post-app
  summary: Create an application
  tags:
  - Applications
  description: |
    Creates a new application. After successful creation, additional steps are needed to deploy the application, depending on the application type. Refer to [Application creation workflow](https://techdocs.akamai.com/eaa-api/reference/application-creation-workflow).
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-an-application-body.json
        schema:
          $ref: ../schemas/application.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-application-200.json
          schema:
            $ref: ../schemas/application.yaml
get:
  operationId: get-apps
  summary: List applications
  tags:
  - Applications
  description: |
    Lists your EAA applications.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/expand-sdk-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-applications-200.json
          schema:
            $ref: ../schemas/applications.yaml
