x-akamai:
  file-path: paths/app-bundle.yaml
  path-info: /mgmt-pop/appbundle/{appBundleId}
parameters:
- $ref: ../parameters/app-bundle-id-path.yaml
get:
  operationId: get-appbundle
  summary: Get an application bundle
  tags:
  - Application bundles
  description: |
    Lists details for a specific application bundle by ID.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-app-bundle-200.json
          schema:
            $ref: ../schemas/app-bundle.yaml
put:
  operationId: put-appbundle
  summary: Modify an application bundle
  tags:
  - Application bundles
  description: |
    Modifies an existing application bundle.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/modify-an-app-bundle-body.json
        schema:
          $ref: ../schemas/app-bundle.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-app-bundle-200.json
          schema:
            $ref: ../schemas/app-bundle.yaml
delete:
  operationId: delete-appbundle
  summary: Delete an application bundle
  tags:
  - Application bundles
  description: |
    Removes an application bundle.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/delete-an-app-bundle-200.json
          schema:
            $ref: ../schemas/message.yaml
