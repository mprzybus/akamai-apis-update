x-akamai:
  file-path: paths/idp.yaml
  path-info: /mgmt-pop/idp/{idp_id}
parameters:
- $ref: ../parameters/idp-id-path.yaml
get:
  operationId: get-idp
  summary: Get an IDP
  tags:
  - IDPs
  description: |
    Gets a single IDP.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-idp-body-200.json
          schema:
            $ref: ../schemas/idp-get-response.yaml
put:
  operationId: put-idp
  summary: Modify an IDP
  tags:
  - IDPs
  description: |
    Updates an existing IDP.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-idp-body-200.json
          schema:
            $ref: ../schemas/idp-get-response.yaml
delete:
  operationId: delete-idp
  summary: Delete an IDP
  tags:
  - IDPs
  description: |
    Deletes an existing IDP.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    204:
      description: |
        Successful response.
