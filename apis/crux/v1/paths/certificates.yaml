x-akamai:
  file-path: paths/certificates.yaml
  path-info: /mgmt-pop/certificates
post:
  operationId: post-certificate
  summary: Create a certificate
  tags:
  - Certificates
  description: |
    Creates a new certificate.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/certificate-post-body-manually.json
        schema:
          $ref: ../schemas/certificate-post.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/certificate-post-body-200-manually.json
          schema:
            $ref: ../schemas/certificate-post.yaml
get:
  operationId: get-certificates
  summary: List certificates
  tags:
  - Certificates
  description: |
    Lists certificates.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/certificate-get-list-200.json
          schema:
            $ref: ../schemas/certificate-list.yaml
