x-akamai:
  file-path: paths/crowdstrike.yaml
  path-info: /device-posture/risk-assessment/partner/crowdstrike
post:
  operationId: post-partner-crowdstrike
  summary: Create a new CrowdStrike integration
  tags:
  - Risk assessment
  description: |
    Adds a new CrowdStrike integration entry.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/post-risk-assessment-partner-crowdstrike-200.json
        schema:
          $ref: ../schemas/crowdstrike-integration.yaml
  responses:
    200:
      description: |
        Successful response.
get:
  operationId: get-partner-crowdstrike
  summary: List CrowdStrike integrations
  tags:
  - Risk assessment
  description: |
    Gets existing CrowdStrike integrations.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-risk-assessment-partner-crowdstrike-200.json
          schema:
            $ref: ../schemas/crowdstrike-get-integrations.yaml
