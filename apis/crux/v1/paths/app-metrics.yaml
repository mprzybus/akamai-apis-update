x-akamai:
  file-path: paths/app-metrics.yaml
  path-info: /mgmt-pop/agents/{agentId}/app-metrics
parameters:
- $ref: ../parameters/agent-id-path.yaml
get:
  operationId: get-connector-app-metrics
  summary: List application metrics for connector
  tags:
  - Connectors
  description: |
    Lists application metrics for the specified connector.
  parameters:
  - $ref: ../parameters/app-uuid-url-query.yaml
  - $ref: ../parameters/start-query.yaml
  - $ref: ../parameters/end-query.yaml
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/agentsappmetrics-200.json
          schema:
            $ref: ../schemas/agentsappmetrics.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    415:
      $ref: ../errors/415.yaml
