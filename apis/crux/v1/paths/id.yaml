x-akamai:
  file-path: paths/id.yaml
  path-info: /mgmt-pop/services/{id}
parameters:
- $ref: ../parameters/id-path.yaml
get:
  operationId: get-rule
  summary: Get a rule
  tags:
  - Rules
  description: |
    Gets a single rule by ID.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-update-rules-200.json
          schema:
            $ref: ../schemas/rules.yaml
put:
  operationId: put-rule
  summary: Modify a rule
  tags:
  - Rules
  description: |
    Updates an existing rule.
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/update-rules-body.json
        schema:
          $ref: ../schemas/rules-put.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-update-rules-200.json
          schema:
            $ref: ../schemas/rules-put.yaml
delete:
  operationId: delete-rule
  summary: Delete a rule
  tags:
  - Rules
  description: |
    Deletes an existing rule.
  responses:
    204:
      description: |
        Successful response.
