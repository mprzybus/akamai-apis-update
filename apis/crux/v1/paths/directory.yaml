x-akamai:
  file-path: paths/directory.yaml
  path-info: /mgmt-pop/directories/{directory_id}
parameters:
- $ref: ../parameters/directory-id-path.yaml
get:
  operationId: get-directory
  summary: Get a directory
  tags:
  - Directory administration
  description: |
    Gets a single directory.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-directory-details-200.json
          schema:
            $ref: ../schemas/idpdirectory.yaml
put:
  operationId: put-directory
  summary: Modify a directory
  tags:
  - Directory administration
  description: |
    Updates an existing directory.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/update-directory-request.json
        schema:
          $ref: ../schemas/idpdirectory.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-directory-details-200.json
          schema:
            $ref: ../schemas/idpdirectory.yaml
delete:
  operationId: delete-directory
  summary: Delete a directory
  tags:
  - Directory administration
  description: |
    Deletes an existing directory.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    204:
      description: |
        Successful response.
