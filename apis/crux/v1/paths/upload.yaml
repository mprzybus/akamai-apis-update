x-akamai:
  file-path: paths/upload.yaml
  path-info: /mgmt-pop/certificates/{certificateId}/upload
parameters:
- $ref: ../parameters/certificate-id-path.yaml
post:
  operationId: post-certificate-upload
  summary: Upload a certificate
  tags:
  - Certificates
  description: |
    Modifies a certificate.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      multipart/form-data:
        example:
          $ref: ../examples/certificate-post-body-manually.json
        schema:
          $ref: ../schemas/certificate-post-upload.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/certificate-post-body-200-upload.json
          schema:
            $ref: ../schemas/certificate-upload-200.yaml
