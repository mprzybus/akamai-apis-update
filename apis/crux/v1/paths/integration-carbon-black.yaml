x-akamai:
  file-path: paths/integration-carbon-black.yaml
  path-info: /device-posture/risk-assessment/partner/carbon-black/{integration_id}
parameters:
- $ref: ../parameters/integration-id-path.yaml
get:
  operationId: get-partner-carbon-black-integration
  summary: Get a Carbon Black integration
  tags:
  - Risk assessment
  description: |
    Lists the details a specific Carbon Black integration.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-risk-assessment-partner-carbon-black-specific-integration-200.json
          schema:
            $ref: ../schemas/carbon-black-integration.yaml
put:
  operationId: put-partner-carbon-black-integration
  summary: Modify a Carbon Black integration
  tags:
  - Risk assessment
  description: |
    Updates details for a specific Carbon Black integration.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/put-risk-assessment-partner-carbon-black-200.json
        schema:
          $ref: ../schemas/carbon-black-integration.yaml
  responses:
    200:
      description: |
        Successful response.
delete:
  operationId: delete-partner-carbon-black-integration
  summary: Delete a Carbon Black integration
  tags:
  - Risk assessment
  description: |
    Deletes a specific Carbon Black integration.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
