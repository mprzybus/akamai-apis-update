x-akamai:
  file-path: paths/app-groups.yaml
  path-info: /mgmt-pop/appgroups
post:
  operationId: post-assign-app-groups
  summary: Assign directory groups to applications
  tags:
  - Application groups
  description: |
    Assigns one or more directory groups to one or more applications.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/post-assign-app-to-group.json
        schema:
          $ref: ../schemas/assign-app-directory.yaml
  responses:
    200:
      description: |
        The response reflects the app group assignment.
      content:
        application/json:
          example:
            $ref: ../examples/assign-app-group-post-200.json
          schema:
            $ref: ../schemas/assign-app-group-response.yaml
get:
  operationId: get-app-groups
  summary: List application rewrite groups
  tags:
  - Application rewrite groups
  description: |
    Lists your application groups.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-app-groups-200.json
          schema:
            $ref: ../schemas/app-groups.yaml
