x-akamai:
  file-path: paths/group-membership.yaml
  path-info: /mgmt-pop/groupmembership/{groupmembership_id}
parameters:
- $ref: ../parameters/groupmembership-id-path.yaml
get:
  operationId: get-group-membership
  summary: Get a directory group membership
  tags:
  - Directory group membership
  description: |
    Gets a single group membership.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-single-group-membership-200.json
          schema:
            $ref: ../schemas/groupmembership.yaml
delete:
  operationId: delete-group-membership
  summary: Delete a directory group membership
  tags:
  - Directory group membership
  description: |
    Deletes an existing group membership.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/delete-group-membership-response.json
          schema:
            $ref: ../schemas/groupmembership-delete-response.yaml
