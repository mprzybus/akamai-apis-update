x-akamai:
  file-path: paths/app-directories.yaml
  path-info: /mgmt-pop/appdirectories
post:
  operationId: post-app-directory
  summary: Create or delete application directories
  tags:
  - Application directories
  description: |
    Creates or deletes a set of application and directories.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/method-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-app-directories-body.json
        schema:
          $ref: ../schemas/create-app-directory.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-app-directory-200.json
          schema:
            $ref: ../schemas/app-directory.yaml
get:
  operationId: get-app-directories
  summary: List application directories
  tags:
  - Application directories
  description: |
    Lists your application directories.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-app-directories-200.json
          schema:
            $ref: ../schemas/app-directories.yaml
