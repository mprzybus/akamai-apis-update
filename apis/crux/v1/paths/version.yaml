x-akamai:
  file-path: paths/version.yaml
  path-info: /mgmt-pop/apps/{applicationId}/versions/{versionId}
parameters:
- $ref: ../parameters/version-id-path.yaml
- $ref: ../parameters/application-id-path.yaml
get:
  operationId: get-app-version
  summary: Get an application version
  tags:
  - Versions
  description: |
    Lists an application version.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-app-config-version-200.json
          schema:
            $ref: ../schemas/appconfigversion.yaml
put:
  operationId: put-app-version
  summary: Create a new application version from existing
  tags:
  - Versions
  description: |
    Copies the selected application version to a new draft application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/copy-configversion-to-draft-200.json
          schema:
            $ref: ../schemas/appconfigversion.yaml
