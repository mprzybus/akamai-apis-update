x-akamai:
  file-path: paths/agents-per-app.yaml
  path-info: /mgmt-pop/apps/{applicationId}/agents
parameters:
- $ref: ../parameters/application-id-path.yaml
post:
  operationId: post-app-connectors
  summary: Assign connectors to an application
  tags:
  - Connectors
  description: |
    Assign connectors to an application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/assign-agents-application-body.json
        schema:
          $ref: ../schemas/assign-agents-application-request.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/assign-agents-application-200.json
          schema:
            $ref: ../schemas/assign-agents-application-response.yaml
get:
  operationId: get-app-connectors
  summary: List connectors for an application
  tags:
  - Connectors
  description: |
    Lists connectors for an application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-app-agents-200.json
          schema:
            $ref: ../schemas/list-app-agents.yaml
