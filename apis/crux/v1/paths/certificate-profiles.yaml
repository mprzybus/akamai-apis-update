x-akamai:
  file-path: paths/certificate-profiles.yaml
  path-info: /device-posture/risk-assessment/certificate-profiles
post:
  operationId: post-certificate-profile
  summary: Create certificate profile
  tags:
  - Risk assessment
  description: |
    Creates a new Certificate profile.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/risk-assessment-certificate-profile-post-put-200.json
        schema:
          $ref: ../schemas/certificate-profile.yaml
  responses:
    201:
      description: |
        Successful response.
      headers:
        Location:
          $ref: ../headers/location-header.yaml
      content:
        application/json:
          example:
            $ref: ../examples/risk-assesment-certificate-profile-created-post-200.json
          schema:
            $ref: ../schemas/certificate-profile-id.yaml
get:
  operationId: get-certificate-profiles
  summary: List certificate profiles
  tags:
  - Risk assessment
  description: |
    Lists the existing certificate profiles.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-risk-assessment-certificate-profiles-200.json
          schema:
            $ref: ../schemas/certificate-profile-list.yaml
