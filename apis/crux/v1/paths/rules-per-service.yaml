x-akamai:
  file-path: paths/rules-per-service.yaml
  path-info: /mgmt-pop/services/{id}/rules
parameters:
- $ref: ../parameters/id-path.yaml
post:
  operationId: post-access-control-rule
  summary: Create an access control rule
  tags:
  - Rules
  description: |
    Creates a new access control rule.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        examples:
          deny-group-rule:
            summary: Deny group rule
            value:
              $ref: ../examples/group-rule-body.json
          deny-method:
            summary: Deny method
            value:
              $ref: ../examples/methodwise-body.json
          deny-region-rule:
            summary: Deny region rule
            value:
              $ref: ../examples/region-wise-body.json
          deny-url:
            summary: Deny URL
            value:
              $ref: ../examples/deny-url-body.json
          deny-user:
            summary: Deny user
            value:
              $ref: ../examples/deny-user-body.json
        schema:
          $ref: ../schemas/access-rule.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          examples:
            deny-group-rule:
              summary: Deny group rule
              value:
                $ref: ../examples/group-rule-200.json
            deny-method:
              summary: Deny method
              value:
                $ref: ../examples/methodwise-200.json
            deny-region-rule:
              summary: Deny region rule
              value:
                $ref: ../examples/region-wise-200.json
            deny-url:
              summary: Deny URL
              value:
                $ref: ../examples/deny-url-200.json
            deny-user:
              summary: Deny user
              value:
                $ref: ../examples/deny-user-200.json
          schema:
            $ref: ../schemas/access-rule.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    415:
      $ref: ../errors/415.yaml
put:
  operationId: put-access-control-rule
  summary: Modify an access control rule
  tags:
  - Rules
  description: |
    Updates an existing access control rule.
  requestBody:
    required: true
    content:
      application/json:
        examples:
          update-deny-group:
            summary: Update deny group
            value:
              $ref: ../examples/update-groupname-body.json
          update-deny-region:
            summary: Update deny region
            value:
              $ref: ../examples/update-region-rule-body.json
          update-deny-url:
            summary: Update deny URL
            value:
              $ref: ../examples/update-deny-user-body.json
          update-deny-user:
            summary: Update deny user
            value:
              $ref: ../examples/update-deny-url-rule-body.json
        schema:
          $ref: ../schemas/update-access-control-rule.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          examples:
            update-deny-group:
              summary: Update deny group
              value:
                $ref: ../examples/update-groupname-200.json
            update-deny-region:
              summary: Update deny region
              value:
                $ref: ../examples/update-region-rule-200.json
            update-deny-url:
              summary: Update deny URL
              value:
                $ref: ../examples/update-deny-url-rule-200.json
            update-deny-user:
              summary: Update deny user
              value:
                $ref: ../examples/update-deny-user-rule-200.json
          schema:
            $ref: ../schemas/update-access-control-rule.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    415:
      $ref: ../errors/415.yaml
