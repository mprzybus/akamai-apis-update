x-akamai:
  file-path: paths/uuid-url.yaml
  path-info: /mgmt-pop/agents/{uuid_url}
parameters:
- $ref: ../parameters/uuid-url-path.yaml
get:
  operationId: get-connector
  summary: Get a connector
  tags:
  - Connectors
  description: |
    Retrieves a single connector by ID.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/agent-get-create-200.json
          schema:
            $ref: ../schemas/agent.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    415:
      $ref: ../errors/415.yaml
put:
  operationId: put-connector
  summary: Modify a connector
  tags:
  - Connectors
  description: |
    Updates an existing connector.
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/update-agent-body.json
        schema:
          $ref: ../schemas/agent.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/update-agent-200.json
          schema:
            $ref: ../schemas/agent.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    415:
      $ref: ../errors/415.yaml
delete:
  operationId: delete-connector
  summary: Delete a connector
  tags:
  - Connectors
  description: |
    Deletes an existing connector.
  responses:
    204:
      description: |
        Successful response.
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    415:
      $ref: ../errors/415.yaml
