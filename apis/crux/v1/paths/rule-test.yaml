x-akamai:
  file-path: paths/rule-test.yaml
  path-info: /device-posture/risk-assessment/test/{ruleId}
parameters:
- $ref: ../parameters/rule-id-path.yaml
put:
  operationId: put-test-ruleid
  summary: Test risk rule
  tags:
  - Risk assessment
  description: |
    Tests the specified risk rule against existing devices.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/get-risk-assessment-tag-200.json
        schema:
          $ref: ../schemas/risk-rule.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-device-summary-risk-assessment-200.json
          schema:
            $ref: ../schemas/risk-assessment.yaml
