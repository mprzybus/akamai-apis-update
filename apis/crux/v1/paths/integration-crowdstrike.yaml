x-akamai:
  file-path: paths/integration-crowdstrike.yaml
  path-info: /device-posture/risk-assessment/partner/crowdstrike/{integration_id}
parameters:
- $ref: ../parameters/integration-id-path.yaml
get:
  operationId: get-partner-crowdstrike-integration
  summary: Get a CrowdStrike integration
  tags:
  - Risk assessment
  description: |
    Gets a specific CrowdStrike integration.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-risk-assessment-partner-crowdstrike-specific-integration-200.json
          schema:
            $ref: ../schemas/crowdstrike-integration.yaml
put:
  operationId: put-partner-crowdstrike-integration
  summary: Modify a CrowdStrike integration
  tags:
  - Risk assessment
  description: |
    Updates details for a specific integration entry.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/put-risk-assessment-partner-crowdstrike-200.json
        schema:
          $ref: ../schemas/crowdstrike-integration.yaml
  responses:
    200:
      description: |
        Successful response.
delete:
  operationId: delete-partner-crowdstrike-integration
  summary: Delete a CrowdStrike integration
  tags:
  - Risk assessment
  description: |
    Deletes a specific CrowdStrike integration.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
