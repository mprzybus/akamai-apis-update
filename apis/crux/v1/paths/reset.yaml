x-akamai:
  file-path: paths/reset.yaml
  path-info: /mgmt-pop/tenant/mfa/reset
post:
  operationId: post-tenant-mfa-reset
  summary: Reset MFA user password
  tags:
  - User administration
  description: |
    Resets the one time password (OTP) of a user.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/reset-otp-mfauser-post-request.json
        schema:
          $ref: ../schemas/mfauser-reset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/reset-otp-mfauser-post-response.json
          schema:
            $ref: ../schemas/mfauser-reset.yaml
