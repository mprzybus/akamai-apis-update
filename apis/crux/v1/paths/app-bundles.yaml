x-akamai:
  file-path: paths/app-bundles.yaml
  path-info: /mgmt-pop/appbundle
post:
  operationId: post-appbundle
  summary: Create an application bundle
  tags:
  - Application bundles
  description: |
    Creates a new application bundle.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-an-app-bundle-body.json
        schema:
          $ref: ../schemas/app-bundle.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-app-bundle-200.json
          schema:
            $ref: ../schemas/app-bundle.yaml
get:
  operationId: get-appbundles
  summary: List application bundles
  tags:
  - Application bundles
  description: |
    Lists your application bundles.
  parameters:
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  - $ref: ../parameters/contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-app-bundles-200.json
          schema:
            $ref: ../schemas/app-bundles.yaml
