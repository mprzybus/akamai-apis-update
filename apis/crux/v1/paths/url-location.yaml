x-akamai:
  file-path: paths/url-location.yaml
  path-info: /mgmt-pop/apps/{applicationId}/urllocation
parameters:
- $ref: ../parameters/application-id-path.yaml
post:
  operationId: post-app-urllocation
  summary: Create a URL location rule
  tags:
  - URL location rules
  description: |
    Creates a URL location rule.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-an-urllocation-body.json
        schema:
          $ref: ../schemas/create-urllocation-body.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/create-an-urllocation-200.json
          schema:
            $ref: ../schemas/get-urllocation.yaml
get:
  operationId: get-app-urllocations
  summary: List URL location rules
  tags:
  - URL location rules
  description: |
    Lists URL location rules for an application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-app-urllocation-200.json
          schema:
            $ref: ../schemas/object-urllocation.yaml
