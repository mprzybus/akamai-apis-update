x-akamai:
  file-path: paths/app-idps.yaml
  path-info: /mgmt-pop/appidp
post:
  operationId: post-app-idp
  summary: Assign an IDP to an application
  tags:
  - Application IDPs
  description: |
    Assign an existing IDP to an application. Overwrites any existing IDP assigned to the application.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-app-idp-body.json
        schema:
          $ref: ../schemas/create-app-idp.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-an-app-idp-200.json
          schema:
            $ref: ../schemas/app-idp.yaml
get:
  operationId: get-app-idps
  summary: List application IDPs
  tags:
  - Application IDPs
  description: |
    Lists your application IDPs.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-app-idps-200.json
          schema:
            $ref: ../schemas/app-idps.yaml
