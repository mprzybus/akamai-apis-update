x-akamai:
  file-path: paths/directories.yaml
  path-info: /mgmt-pop/directories
post:
  operationId: post-directory
  summary: Create a directory
  tags:
  - Directory administration
  description: |
    Creates a new directory.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/add-directory-request-post.json
        schema:
          $ref: ../schemas/create-directory.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/add-directory-post-200.json
          schema:
            $ref: ../schemas/idpdirectory.yaml
get:
  operationId: get-directories
  summary: List directories
  tags:
  - Directory administration
  description: |
    Lists directories, with optional filters and pagination.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/expand-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/get-directories-200.json
          schema:
            $ref: ../schemas/idpdirectories.yaml
