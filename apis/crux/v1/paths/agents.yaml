x-akamai:
  file-path: paths/agents.yaml
  path-info: /mgmt-pop/agents
post:
  operationId: post-connector
  summary: Create a connector
  tags:
  - Connectors
  description: |
    Creates a new connector.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/create-agent-body.json
        schema:
          $ref: ../schemas/agent-create.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/agent-get-create-200.json
          schema:
            $ref: ../schemas/agent.yaml
get:
  operationId: get-connectors
  summary: List connectors
  tags:
  - Connectors
  description: |
    Lists connectors.
  parameters:
  - $ref: ../parameters/contract-id-query.yaml
  - $ref: ../parameters/pageable-limit.yaml
  - $ref: ../parameters/pageable-offset.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/agent-get-list-200.json
          schema:
            $ref: ../schemas/agents.yaml
