x-akamai:
  file-path: paths/certificate-profile.yaml
  path-info: /device-posture/risk-assessment/certificate-profiles/{certificateProfileId}
parameters:
- $ref: ../parameters/certificate-profile-id-path.yaml
get:
  operationId: get-certificate-profile
  summary: Get certificate profile
  tags:
  - Risk assessment
  description: |
    Get a certificate profile by its id.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/list-risk-assessment-certificate-profile-by-id-200.json
          schema:
            $ref: ../schemas/certificate-profile-with-id.yaml
put:
  operationId: put-certificate-profile
  summary: Update certificate profile
  tags:
  - Risk assessment
  description: |
    Update a certificate profile.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/risk-assessment-certificate-profile-post-put-200.json
        schema:
          $ref: ../schemas/certificate-profile.yaml
  responses:
    200:
      description: |
        Successful response.
delete:
  operationId: delete-certificate-profile
  summary: Delete certificate profile
  tags:
  - Risk assessment
  description: |
    Delete a certificate profile.
  parameters:
  - $ref: ../parameters/optional-contract-id-query.yaml
  responses:
    200:
      description: |
        Successful response.
