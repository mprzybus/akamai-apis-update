x-akamai:
  file-path: paths/onboarding-certificate-validation.yaml
  path-info: /onboardings/{onboardingId}/certificate-validation/validate
parameters:
- $ref: ../parameters/onboarding-id-path.yaml
post:
  operationId: post-onboarding-certificate-validation
  summary: Validate onboarding certificate
  tags:
  - 'Onboarding: Post-activation validation'
  description: |
    Validates the certificate's `TXT` DNS record. Once validation completes, it takes about five minutes to deploy the certificates across Akamai's global network. You can validate with HTTP token, DNS records, or URL redirect.
  x-akamai:
    labels:
    - All products
  responses:
    200:
      description: |
        Successfully validated certificate challenges.
      content:
        application/json:
          example:
            $ref: ../examples/onboarding-certificate-validation.json
          schema:
            $ref: ../schemas/onboarding-certificate-validation.yaml
    207:
      description: |
        Partially validated\tCertificate Challenges.
      content:
        application/json:
          example:
            $ref: ../examples/onboarding-certificate-validation.json
          schema:
            $ref: ../schemas/onboarding-certificate-validation.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You aren't authorized to run this operation.
      $ref: ../errors/403.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). The `onboardingId` was not found.
      $ref: ../errors/404.yaml
    500:
      description: |
        [Conflict](https://techdocs.akamai.com/application-security/reference/500). Validating certificate challenges failed.
      $ref: ../errors/500.yaml
