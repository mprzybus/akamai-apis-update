x-akamai:
  file-path: paths/challenge-action-google-recaptcha.yaml
  path-info: /configs/{configId}/versions/{versionNumber}/response-actions/challenge-actions/{actionId}/google-recaptcha-secret-key
parameters:
- $ref: ../parameters/config-id-path.yaml
- $ref: ../parameters/version-number-path.yaml
- $ref: ../parameters/action-id.yaml
put:
  operationId: put-google-recaptcha-secret-key
  summary: Update Google reCAPTCHA secret key
  tags:
  - Challenge actions
  description: |
    Specify a different Google reCAPTCHA secret key for a challenge action. The secret key authorizes communication between your site and the reCAPTCHA server.
  requestBody:
    content:
      application/json:
        example:
          $ref: ../examples/google-recaptcha-secret-key.json
        schema:
          $ref: ../schemas/google-recaptcha-secret-key.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/google-recaptcha-secret-key.json
          schema:
            $ref: ../schemas/google-recaptcha-secret-key.yaml
    400:
      description: |
        The request body has invalid fields.
      content:
        application/problem+json:
          example:
            $ref: ../examples/google-recaptcha-secret-key-400.json
          schema:
            $ref: ../schemas/problem-details.yaml
    403:
      description: |
        You don't have permission to access the resource.
      content:
        application/problem+json:
          example:
            $ref: ../examples/403.json
          schema:
            $ref: ../schemas/problem-details.yaml
    404:
      description: |
        The requested challenge action was not found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/google-recaptcha-secret-key-404.json
          schema:
            $ref: ../schemas/problem-details.yaml
