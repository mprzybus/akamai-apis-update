x-akamai:
  file-path: paths/config-custom-rules-usage.yaml
  path-info: /configs/{configId}/versions/{versionNumber}/custom-rules/usage
parameters:
- $ref: ../parameters/config-id-path.yaml
- $ref: ../parameters/version-number-path.yaml
post:
  operationId: post-config-custom-rules-usage
  summary: List custom rules usage by security policies
  tags:
  - 'Shared resources: Custom rules'
  description: |
    Returns a list of security policies using each requested custom rule with a set action (Allow or Deny), if any apply. Skips custom rule IDs that do not belong to this security configuration.
  x-akamai:
    labels:
    - All products
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/config-custom-rules-usage-request.json
        schema:
          $ref: ../schemas/config-custom-rules-usage-request.yaml
  responses:
    200:
      description: |
        Returns all requested custom rules along with a list of the security policies using them, if any are available.
      content:
        application/json:
          example:
            $ref: ../examples/config-custom-rules-usage-response.json
          schema:
            $ref: ../schemas/config-custom-rules-usage-response.yaml
