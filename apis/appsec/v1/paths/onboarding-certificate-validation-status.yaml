x-akamai:
  file-path: paths/onboarding-certificate-validation-status.yaml
  path-info: /onboardings/{onboardingId}/certificate-validation
parameters:
- $ref: ../parameters/onboarding-id-path.yaml
get:
  operationId: get-onboarding-certificate-validation
  summary: List onboarding certificate challenges
  tags:
  - 'Onboarding: Post-activation validation'
  description: |
    Returns the information you need to validate your certificate. Add the `TXT` DNS record listed in the  response to your DNS record. Adding the `TXT` record won't affect your website. Once you've added the `TXT` record, and before the token expires, run [Validate onboarding certificate](https://techdocs.akamai.com/application-security/docs/post-onboarding-certificate-validation) to validate the certificate.
  x-akamai:
    labels:
    - All products
  responses:
    200:
      description: |
        Successfully retrieved certificate Challenges.
      content:
        application/json:
          example:
            $ref: ../examples/onboarding-certificate-validation.json
          schema:
            $ref: ../schemas/onboarding-certificate-validation.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You aren't authorized to run this operation.
      $ref: ../errors/403.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). The `onboardingId` was not found.
      $ref: ../errors/404.yaml
    500:
      description: |
        [Conflict](https://techdocs.akamai.com/application-security/reference/500). Failure to retrieve certificate challenges.
      $ref: ../errors/500.yaml
