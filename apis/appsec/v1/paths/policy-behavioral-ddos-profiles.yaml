x-akamai:
  file-path: paths/policy-behavioral-ddos-profiles.yaml
  path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/behavioral-ddos
parameters:
- $ref: ../parameters/config-id-path.yaml
- $ref: ../parameters/version-number-path.yaml
- $ref: ../parameters/policy-id-path.yaml
get:
  operationId: get-behavioral-ddos-actions
  summary: List Behavioral DDoS profile actions
  tags:
  - Behavioral DDoS profile actions
  description: |
    Returns a list of all Behavioral DDoS profiles currently in use, along with the actions each profile takes when conditions are met. _Products:_ All.
  responses:
    200:
      description: |
        In-use Behavioral DDoS profiles for this configuration.
      content:
        application/json:
          example:
            $ref: ../examples/behavioral-ddos-actions-get-200.json
          schema:
            $ref: ../schemas/behavioral-ddos-actions.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). Security configuration version or policy wasn't found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/404.json
          schema:
            $ref: ../schemas/problem-details.yaml
    405:
      $ref: ../errors/405.yaml
    406:
      $ref: ../errors/406.yaml
    500:
      $ref: ../errors/500-server-errors.yaml
