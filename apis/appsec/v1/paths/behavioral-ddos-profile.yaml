x-akamai:
  file-path: paths/behavioral-ddos-profile.yaml
  path-info: /configs/{configId}/versions/{versionNumber}/behavioral-ddos/{profileId}
parameters:
- $ref: ../parameters/config-id-path.yaml
- $ref: ../parameters/version-number-path.yaml
- $ref: ../parameters/behavioral-ddos-profile-id-path.yaml
get:
  operationId: get-behavioral-ddos-profile
  summary: Get a Behavioral DDoS profile
  tags:
  - Behavioral DDoS protection profiles
  description: |
    Returns the specified Behavioral DDoS profile. _Products:_ All.
  responses:
    200:
      description: |
        Successfully returned the Behavioral DDoS profile.
      content:
        application/json:
          example:
            $ref: ../examples/behavioral-ddos-profile-get-200.json
          schema:
            $ref: ../schemas/behavioral-ddos-profile.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You don't have access to the Behavioral DDoS profile in this security configuration.
      content:
        application/problem+json:
          example:
            $ref: ../examples/403.json
          schema:
            $ref: ../schemas/problem-details.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). Security configuration version or Behavioral DDoS profile wasn't found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/404.json
          schema:
            $ref: ../schemas/problem-details.yaml
    405:
      $ref: ../errors/405.yaml
    406:
      $ref: ../errors/406.yaml
    500:
      $ref: ../errors/500-server-errors.yaml
put:
  operationId: put-behavioral-ddos-profile
  summary: Modify a Behavioral DDoS profile
  tags:
  - Behavioral DDoS protection profiles
  description: |
    Updates the specified Behavioral DDoS profile. _Products:_ All.
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/behavioral-ddos-profile-put.json
        schema:
          $ref: ../schemas/behavioral-ddos-profile.yaml
  responses:
    200:
      description: |
        Successfully updated Behavioral DDoS profile.
      content:
        application/json:
          example:
            $ref: ../examples/behavioral-ddos-profile-get-200.json
          schema:
            $ref: ../schemas/behavioral-ddos-profile.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You don't have access to Behavioral DDoS profile in this security configuration.
      content:
        application/problem+json:
          example:
            $ref: ../examples/403.json
          schema:
            $ref: ../schemas/problem-details.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). Security configuration version or Behavioral DDoS profile wasn't found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/404.json
          schema:
            $ref: ../schemas/problem-details.yaml
    405:
      $ref: ../errors/405.yaml
    406:
      $ref: ../errors/406.yaml
    500:
      $ref: ../errors/500-server-errors.yaml
delete:
  operationId: delete-behavioral-ddos-profile
  summary: Remove a Behavioral DDoS profile
  tags:
  - Behavioral DDoS profiles
  description: |
    Deletes the specified Behavioral DDoS profile. You can't delete a Behavioral DDoS profile that's actively in use. To delete an active Behavioral DDoS profile, either activate an older configuration version or create a new version without the policy in place. _Products:_ All.
  responses:
    204:
      description: |
        Successfully deleted the Behavioral DDoS profile.
      content: {}
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You don't have access to the Behavioral DDoS profile in this security configuration.
      content:
        application/problem+json:
          example:
            $ref: ../examples/403.json
          schema:
            $ref: ../schemas/problem-details.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). Security configuration version or Behavioral DDoS profile wasn't found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/404.json
          schema:
            $ref: ../schemas/problem-details.yaml
    405:
      $ref: ../errors/405.yaml
    406:
      $ref: ../errors/406.yaml
    500:
      $ref: ../errors/500-server-errors.yaml
