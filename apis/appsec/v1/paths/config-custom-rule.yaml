x-akamai:
  file-path: paths/config-custom-rule.yaml
  path-info: /configs/{configId}/custom-rules/{ruleId}
parameters:
- $ref: ../parameters/rule-id-path.yaml
- $ref: ../parameters/config-id-path.yaml
get:
  operationId: get-config-custom-rule
  summary: Get a custom rule
  tags:
  - 'Shared resources: Custom rules'
  description: |
    Returns the details of a custom rule.
  x-akamai:
    labels:
    - All products
  responses:
    200:
      description: |
        Responds with the requested rule.
      content:
        application/json:
          example:
            $ref: ../examples/custom-rule.json
          schema:
            $ref: ../schemas/custom-rule.yaml
put:
  operationId: put-config-custom-rule
  summary: Modify a custom rule
  tags:
  - 'Shared resources: Custom rules'
  description: |
    Updates an existing custom rule.
  x-akamai:
    labels:
    - All products
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/custom-rule-put.json
        schema:
          $ref: ../schemas/custom-rule.yaml
  responses:
    200:
      description: |
        Responds with the updated rule.
      content:
        application/json:
          example:
            $ref: ../examples/custom-rule.json
          schema:
            $ref: ../schemas/custom-rule.yaml
delete:
  operationId: delete-config-custom-rule
  summary: Remove a custom rule
  tags:
  - 'Shared resources: Custom rules'
  description: |
    Deletes a custom rule as long as it isn't activated.
  x-akamai:
    labels:
    - All products
  responses:
    204:
      description: |
        Custom rule successfully deleted.
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). Custom rule used and cannot be deleted.
      $ref: ../errors/403.yaml
