x-akamai:
  file-path: paths/onboarding-activations-status.yaml
  path-info: /onboardings/{onboardingId}/activations/{activationId}
parameters:
- $ref: ../parameters/onboarding-id-path.yaml
- $ref: ../parameters/activation-id-path.yaml
get:
  operationId: get-onboarding-activation-status
  summary: Get an onboarding activation
  tags:
  - 'Onboarding: Activations and status'
  description: |
    Returns the status of an activation. Activations can take about 20 minutes. If the activation fails, to specific information about the failure is returned in the error response.
  x-akamai:
    labels:
    - App & API Protector
    - App & API Protector with the Advanced Security module
  responses:
    200:
      description: |
        Onboarding Activation is completed.
      content:
        application/json:
          example:
            $ref: ../examples/onboarding-activation-get-200.json
          schema:
            $ref: ../schemas/onboarding-activation-post-202.yaml
    202:
      description: |
        Onboarding activation is in progress.
      content:
        application/json:
          example:
            $ref: ../examples/onboarding-activation-get-202.json
          schema:
            $ref: ../schemas/onboarding-activation-post-202.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You aren't authorized to run this operation.
      $ref: ../errors/403.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). The `onboardingId` or `activationId` was not found.
      $ref: ../errors/404.yaml
    500:
      description: |
        [Conflict](https://techdocs.akamai.com/application-security/reference/500). Onboarding activation failed.
      $ref: ../errors/500-onboarding-activation.yaml
