x-akamai:
  file-path: paths/onboarding-cname-to-akamai.yaml
  path-info: /onboardings/{onboardingId}/cname-to-akamai
parameters:
- $ref: ../parameters/onboarding-id-path.yaml
post:
  operationId: post-validate-onboarding-cname-records
  summary: Validate hostname CNAME DNS records
  tags:
  - 'Onboarding: Post-activation validation'
  description: |
    Validates your site is ready to serve traffic. Call this operation after you've replaced the DNS entry that directs traffic to your site with the DNS CNAME records in [List hostname CNAME DNS records](https://techdocs.akamai.com/application-security/docs/get-onboarding-cname-records). In each record, set the time-to-live (TTL) to 300 seconds (5 minutes). Once this call completes, run [Get an onboarding](https://techdocs.akamai.com/application-security/docs/get-onboarding) to verify your onboarding is complete. When you've successfully completed any validations and CNAME changes, you'll see `onboardingStatus: "COMPLETE"` in the response.
  x-akamai:
    labels:
    - All products
  responses:
    200:
      description: |
        Successfully validated CNAME DNS records.
      content:
        application/json:
          example:
            $ref: ../examples/onboarding-cname-validation-200.json
          schema:
            $ref: ../schemas/onboarding-cname-validation-200.yaml
    202:
      description: |
        Pending DNS record validation.
      content:
        application/json:
          example:
            $ref: ../examples/onboarding-cname-validation.json
          schema:
            $ref: ../schemas/onboarding-cname-validation.yaml
    207:
      description: |
        Partially validated CNAME DNS records.
      content:
        application/json:
          example:
            $ref: ../examples/onboarding-cname-validation.json
          schema:
            $ref: ../schemas/onboarding-cname-validation.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You aren't authorized to run this operation.
      $ref: ../errors/403.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). The `onboardingId` was not found.
      $ref: ../errors/404.yaml
    500:
      description: |
        [Conflict](https://techdocs.akamai.com/application-security/reference/500). Retrieving CNAME records failed.
      $ref: ../errors/500.yaml
