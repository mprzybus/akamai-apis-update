x-akamai:
  file-path: paths/policy-behavioral-ddos-profile.yaml
  path-info: /configs/{configId}/versions/{versionNumber}/security-policies/{policyId}/behavioral-ddos/{profileId}
parameters:
- $ref: ../parameters/config-id-path.yaml
- $ref: ../parameters/version-number-path.yaml
- $ref: ../parameters/policy-id-path.yaml
- $ref: ../parameters/behavioral-ddos-profile-id-path.yaml
put:
  operationId: put-behavioral-ddos-profile-action
  summary: Modify a Behavioral DDoS profile action
  tags:
  - Behavioral DDoS profile actions
  description: |
    Updates the actions in a Behavioral DDoS profile. _Products:_ All.
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/behavioral-ddos-action-put.json
        schema:
          $ref: ../schemas/behavioral-ddos-action.yaml
  responses:
    200:
      description: |
        Updated action.
      content:
        application/json:
          example:
            $ref: ../examples/behavioral-ddos-action-resp-200.json
          schema:
            $ref: ../schemas/behavioral-ddos-action.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). The configuration wasn't found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/404.json
          schema:
            $ref: ../schemas/problem-details.yaml
    405:
      $ref: ../errors/405.yaml
    406:
      $ref: ../errors/406.yaml
    500:
      $ref: ../errors/500-server-errors.yaml
