x-akamai:
  file-path: paths/challenge-action.yaml
  path-info: /configs/{configId}/versions/{versionNumber}/response-actions/challenge-actions/{actionId}
parameters:
- $ref: ../parameters/config-id-path.yaml
- $ref: ../parameters/version-number-path.yaml
- $ref: ../parameters/action-id.yaml
get:
  operationId: get-challenge-action
  summary: Get a challenge action
  tags:
  - Challenge actions
  description: |
    View details about the specified challenge action.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/challenge-action-response.json
          schema:
            $ref: ../schemas/challenge-action.yaml
    403:
      description: |
        You don't have permission to access the resource.
      content:
        application/problem+json:
          example:
            $ref: ../examples/403.json
          schema:
            $ref: ../schemas/problem-details.yaml
    404:
      description: |
        The resource doesn't exist.
      content:
        application/problem+json:
          example:
            $ref: ../examples/challenge-action-404.json
          schema:
            $ref: ../schemas/problem-details.yaml
put:
  operationId: put-challenge-action
  summary: Update a challenge action
  tags:
  - Challenge actions
  description: |
    Edit the specified challenge action, such as the name, type of challenge, or branding.
  requestBody:
    content:
      application/json:
        example:
          $ref: ../examples/challenge-action-put-request.json
        schema:
          $ref: ../schemas/challenge-action.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/challenge-action-response.json
          schema:
            $ref: ../schemas/challenge-action.yaml
    400:
      description: |
        The request body has invalid fields.
      content:
        application/problem+json:
          example:
            $ref: ../examples/challenge-action-400.json
          schema:
            $ref: ../schemas/problem-details.yaml
    403:
      description: |
        You don't have permission to access the resource.
      content:
        application/problem+json:
          example:
            $ref: ../examples/403.json
          schema:
            $ref: ../schemas/problem-details.yaml
    404:
      description: |
        The requested challenge action was not found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/challenge-action-404.json
          schema:
            $ref: ../schemas/problem-details.yaml
delete:
  operationId: delete-challenge-action
  summary: Delete a challenge action
  tags:
  - Challenge actions
  description: |
    Remove the specified challenge action.
  responses:
    204:
      description: |
        Successful response.
    403:
      description: |
        You don't have permission to access the resource.
      content:
        application/problem+json:
          example:
            $ref: ../examples/403.json
          schema:
            $ref: ../schemas/problem-details.yaml
    404:
      description: |
        The requested challenge action was not found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/challenge-action-404.json
          schema:
            $ref: ../schemas/problem-details.yaml
