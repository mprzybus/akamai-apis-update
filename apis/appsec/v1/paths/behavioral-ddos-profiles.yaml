x-akamai:
  file-path: paths/behavioral-ddos-profiles.yaml
  path-info: /configs/{configId}/versions/{versionNumber}/behavioral-ddos
parameters:
- $ref: ../parameters/config-id-path.yaml
- $ref: ../parameters/version-number-path.yaml
post:
  operationId: post-behavioral-ddos-profile
  summary: Create a Behavioral DDoS profile
  tags:
  - Behavioral DDoS profiles
  description: |
    Creates a new Behavioral DDoS profile for a specific configuration version. _Products:_ All.
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/behavioral-ddos-profile-put.json
        schema:
          $ref: ../schemas/behavioral-ddos-profile.yaml
  responses:
    201:
      description: |
        Successfully created a Behavioral DDoS profile.
      content:
        application/json:
          example:
            $ref: ../examples/behavioral-ddos-profile-get-200.json
          schema:
            $ref: ../schemas/behavioral-ddos-profile.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You don't have access to Behavioral DDoS profiles in this security configuration.
      content:
        application/problem+json:
          example:
            $ref: ../examples/403.json
          schema:
            $ref: ../schemas/problem-details.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). Security configuration version wasn't found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/404.json
          schema:
            $ref: ../schemas/problem-details.yaml
    405:
      $ref: ../errors/405.yaml
    406:
      $ref: ../errors/406.yaml
    500:
      $ref: ../errors/500-server-errors.yaml
get:
  operationId: get-behavioral-ddos-profiles
  summary: List Behavioral DDoS profiles
  tags:
  - Behavioral DDoS profiles
  description: |
    Returns all Behavioral DDoS profiles for a specific security configuration version. _Products:_ All.
  responses:
    200:
      description: |
        Successfully returned the Behavioral DDoS profiles.
      content:
        application/json:
          example:
            $ref: ../examples/behavioral-ddos-profiles-get-200.json
          schema:
            $ref: ../schemas/behavioral-ddos-profiles.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You don't have access to the Behavioral DDoS profiles in this security configuration.
      content:
        application/problem+json:
          example:
            $ref: ../examples/403.json
          schema:
            $ref: ../schemas/problem-details.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). Security configuration version wasn't found.
      content:
        application/problem+json:
          example:
            $ref: ../examples/404.json
          schema:
            $ref: ../schemas/problem-details.yaml
    405:
      $ref: ../errors/405.yaml
    406:
      $ref: ../errors/406.yaml
    500:
      $ref: ../errors/500-server-errors.yaml
