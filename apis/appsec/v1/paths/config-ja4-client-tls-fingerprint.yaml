x-akamai:
  file-path: paths/config-ja4-client-tls-fingerprint.yaml
  path-info: /configs/{configId}/versions/{versionNumber}/advanced-settings/ja4-fingerprint
parameters:
- $ref: ../parameters/config-id-path.yaml
- $ref: ../parameters/version-number-path.yaml
get:
  operationId: get-ja4-fingerprint-settings
  summary: Get JA4 client TLS fingerprint settings
  tags:
  - JA4 Client TLS Fingerprint
  description: |
    Return JA4 client TLS fingerprint settings for a configuration. JA4 is a client-focused fingerprint based on the client TLS handshake. Use JA4 fingerprinting to mitigate DDoS attacks, detect and mitigate bots, and block known attackers from sending application layer attacks payloads. [Learn more about JA4 fingerprinting]( https://techdocs.akamai.com/app-api-protector/docs/adv-settings).
  x-akamai:
    labels:
    - Web Application Protector
    - Kona Site Defender
    status: BETA
  responses:
    200:
      description: |
        Successfully retrieved the JA4 client TLS fingerprint settings.
      content:
        application/json:
          example:
            $ref: ../examples/ja4-client-tls-fingerprint-get-200.json
          schema:
            $ref: ../schemas/ja4-client-tls-fingerprint-get-200.yaml
    400:
      $ref: ../errors/400-client-read-errors.yaml
    404:
      $ref: ../errors/404-client-read-errors.yaml
    500:
      $ref: ../errors/500-server-errors.yaml
put:
  operationId: put-ja4-fingerprint-settings
  summary: Modify JA4 client TLS fingerprint settings
  tags:
  - JA4 Client TLS Fingerprint
  description: |
    Update JA4 client TLS fingerprint settings for a configuration.
  x-akamai:
    labels:
    - Web Application Protector
    - Kona Site Defender
    status: BETA
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/ja4-client-tls-fingerprint-put.json
        schema:
          $ref: ../schemas/ja4-client-tls-fingerprint-put.yaml
  responses:
    200:
      description: |
        Successfully updated the JA4 client TLS fingerprint settings.
      content:
        application/json:
          example:
            $ref: ../examples/ja4-client-tls-fingerprint-put-200.json
          schema:
            $ref: ../schemas/ja4-client-tls-fingerprint-put-200.yaml
    400:
      $ref: ../errors/400-client-read-errors.yaml
    403:
      $ref: ../errors/403-client-write-errors.yaml
    404:
      $ref: ../errors/404-client-read-errors.yaml
    500:
      $ref: ../errors/500-server-errors.yaml
