x-akamai:
  file-path: paths/url-protections.yaml
  path-info: /configs/{configId}/versions/{versionNumber}/url-protections
parameters:
- $ref: ../parameters/config-id-path.yaml
- $ref: ../parameters/version-number-path.yaml
post:
  operationId: post-url-protection-policies
  summary: Create a URL protection policy
  tags:
  - URL protection policies
  description: |
    Creates a new URL protection policy for a specific configuration version.
  x-akamai:
    labels:
    - All products
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/url-protection-policy-post.json
        schema:
          $ref: ../schemas/url-protection-policy.yaml
  responses:
    201:
      description: |
        Successfully created a URL protection policy.
      content:
        application/json:
          example:
            $ref: ../examples/url-protection-policy-get-200.json
          schema:
            $ref: ../schemas/url-protection-policy.yaml
    400:
      $ref: ../errors/400.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You don't have access to URL protection policies in this security configuration.
      $ref: ../errors/403.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). Security configuration version wasn't found.
      $ref: ../errors/404.yaml
get:
  operationId: get-url-protection-policies
  summary: List URL protection policies
  tags:
  - URL protection policies
  description: |
    Returns all URL protection policies for a specific security configuration version.
  x-akamai:
    labels:
    - All products
  responses:
    200:
      description: |
        Successfully returned the URL protection policies.
      content:
        application/json:
          example:
            $ref: ../examples/url-protection-policies-get-200.json
          schema:
            $ref: ../schemas/url-protection-policies.yaml
    403:
      description: |
        [Forbidden](https://techdocs.akamai.com/application-security/reference/403). You don't have access to the URL protection policies in this security configuration.
      $ref: ../errors/403.yaml
    404:
      description: |
        [Not found](https://techdocs.akamai.com/application-security/reference/404). Security configuration version wasn't found.
      $ref: ../errors/404.yaml
