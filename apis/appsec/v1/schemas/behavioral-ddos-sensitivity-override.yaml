type: object
description: |-
  Hostnames and path, overriding the global sensitivity setting.
  
x-akamai:
  file-path: schemas/behavioral-ddos-sensitivity-override.yaml
additionalProperties: false
required:
- host
- path
- sensitivity
properties:
  host:
    type: string
    description: |
      Hostname in host and path pair to override.  Wildcards are allowed (`*` and `?`).
  path:
    type: string
    description: |
      Path in host and path pair to override.  Wildcards are allowed (`*` and `?`).
  sensitivity:
    type: string
    description: |
      Sensitivity level, specify `CONSERVATIVE` to provide tolerance for more substantial traffic deviations, `MODERATE` to provide tolerance for traffic fluctuations, or `STRICT` or high-security environments, where minor deviations in traffic might signal a potential DDoS attack.
    enum:
    - CONSERVATIVE
    - MODERATE
    - STRICT
