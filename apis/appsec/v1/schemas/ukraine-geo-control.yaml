type: object
description: |-
  Take action on requests from Ukraine.
  
x-akamai:
  file-path: schemas/ukraine-geo-control.yaml
additionalProperties: false
properties:
  action:
    description: |
      "The type of action to take for the Donetsk and Luhansk regions of Ukraine. Value is one of:\n  - `deny`. Default.
      Blocked traffic gets a `403` response.\n  - `deny_custom_{custom_deny_id}`.
      Blocked traffic gets a customized deny response.\n  - `alert`. Records the event
      trigger.\n  - `none`. Takes no action. \n\n  <blockquote><strong>Note:</strong>
      As the situation in Ukraine changes, we'll update the included regions.</blockquote>\n"
    $ref: ../schemas/common-action-schema.yml
