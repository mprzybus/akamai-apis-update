type: object
description: |-
  Contains details about the Security Information Event Management (SIEM) integration settings in the exported configuration version.
  
x-akamai:
  file-path: schemas/export-siem.yaml
additionalProperties: false
required:
- enableSiem
- exceptions
- firewallPolicyIds
- siemDefinitionId
- enableForAllPolicies
properties:
  enableForAllPolicies:
    type: boolean
    description: |
      Whether you enabled SIEM for all the security policies in the configuration version. This takes precedence when both `firewallPolicyIds` and `enableForAllPolicies` are present.
  enableSiem:
    type: boolean
    description: |
      Whether you enabled SIEM in the security configuration version.
  enabledBotmanSiemEvents:
    type: boolean
    description: |
      __Deprecated__ Whether you enabled SIEM for the Bot Manager events. Use the `exceptions` field instead to set Botman SIEM events exception.
    x-akamai:
      status: DEPRECATED
    deprecated: true
  exceptions:
    type: array
    description: |
      Describes all attack types and its actions that will be excluded in SIEM events.
    minItems: 0
    items:
      type: object
      additionalProperties: false
      required:
      - actionTypes
      - protection
      properties:
        actionTypes:
          type: array
          description: |
            Describes [actions](https://techdocs.akamai.com/application-security/reference/siem-action-and-attack-type-exceptions) to be excluded for a particular attack type.
          minItems: 0
          items:
            type: string
            enum:
            - '*'
            - alert
            - deny
            - all_custom
            - abort
            - allow
            - delay
            - ignore
            - monitor
            - slow
            - tarpit
        protection:
          type: string
          description: |
            Describes the [attack type](https://techdocs.akamai.com/application-security/reference/siem-action-and-attack-type-exceptions) to be excluded from SIEM events.
          enum:
          - ipgeo
          - rate
          - urlProtection
          - slowpost
          - customrules
          - waf
          - apirequestconstraints
          - clientrep
          - malwareprotection
          - botmanagement
          - aprProtection
  firewallPolicyIds:
    type: array
    description: |
      The list of security policy identifiers for which to enable the SIEM integration.
    minItems: 0
    items:
      type: string
      minLength: 1
  siemDefinitionId:
    type: integer
    description: |
      Uniquely identifies the SIEM settings.
    minimum: 1
