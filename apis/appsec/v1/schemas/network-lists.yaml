type: object
description: |-
  The list of networks. To edit the network lists, use the [Network Lists API](https://techdocs.akamai.com/network-lists/reference/api).
  
x-akamai:
  file-path: schemas/network-lists.yaml
additionalProperties: false
properties:
  action:
    description: |
      The type of deny action to take. Value is one of:
        - `deny`. Default. Blocked traffic gets a `403` response.
        - `deny_custom_{custom_deny_id}`. Blocked traffic gets a customized deny response.
    $ref: ../schemas/ip-geo-action-schema.yml
  networkList:
    type: array
    description: |
      The specific network list you specify to block or allow, depending on the method you choose.
    items:
      type: string
