type: object
description: |-
  Specifies the challenges necessary to validate domain ownership.
  
x-akamai:
  file-path: schemas/onboarding-domain-validation.yaml
additionalProperties: false
required:
- description
- records
- domainValidationLink
- domainValidationStatus
- onboardingLink
properties:
  description:
    type: string
    description: |
      Details the steps you need to perform to validate your domains.
    minLength: 1
  domainValidationLink:
    type: string
    description: |
      The URL to call to validate your domains.
    format: uri
  domainValidationStatus:
    type: string
    description: |
      The cumulative status for all domain validation. If there is more than one domain and each is valid, you'll see a value of `VALIDATION_SUCCESS`. If one domain is valid but another is not, it will say `VALIDATION_NEEDED`.
    enum:
    - VALIDATION_SUCCESS
    - VALIDATION_NEEDED
    minLength: 1
  onboardingLink:
    type: string
    description: |
      The URL to get the onboarding's details.
    format: uri
  records:
    type: array
    description: |
      Lists all hostname record information you need to validate your domains.
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required:
      - hostname
      - recordName
      - recordType
      - recordValue
      - recordTtl
      - httpFilePath
      - httpToken
      - recordStatus
      - urlRedirectFrom
      - urlRedirectTo
      properties:
        hostname:
          type: string
          description: |
            The hostname that needs validation.
          minLength: 1
        httpFilePath:
          type: string
          description: |
            The path to the HTTP file when validating your domain with an HTTP token.
          minLength: 1
        httpToken:
          type: string
          description: |
            The domain record's HTTP token you'll use to validate your domain.
          minLength: 1
        recordName:
          type: string
          description: |
            The fully qualified domain name (FQDN) of this record.
          minLength: 1
        recordStatus:
          type: string
          description: |
            The status of your domain. When `VALIDATED`, you can proceed to the next step in the onboarding process. When `NOT_VALIDATED`, you may need to validate your domain manually.
          enum:
          - VALIDATED
          - NOT_VALIDATED
          minLength: 1
        recordTtl:
          type: integer
          description: |
            The number of seconds that this record should live in cache before being re-fetched.
        recordType:
          type: string
          description: |
            The type of domain record. For example, `A`, `TXT`, or `CNAME`.
          minLength: 1
        recordValue:
          type: string
          description: |
            The challenge record value.
          minLength: 1
        urlRedirectFrom:
          type: string
          description: |
            The originating URL for the site you redirect from when you validate your domain using a redirect.
          minLength: 1
        urlRedirectTo:
          type: string
          description: |
            The destination URL you redirect to when you validate your domain using a redirect.
          minLength: 1
