type: object
description: |-
  Describes reputation profile objects when returned in the configuration export API's response.
  
x-akamai:
  file-path: schemas/export-reputation-profiles.yaml
additionalProperties: false
required:
- id
- name
- context
- threshold
properties:
  id:
    type: integer
    description: |
      __Read-only__ Uniquely identifies the reputation profile.
    readOnly: true
  name:
    type: string
    description: |
      The name you assigned to the reputation profile.
  description:
    type: string
    description: |
      Describes the reputation profile.
  condition:
    type: object
    description: |
      Contains information about the criteria that trigger the reputation profile.
    additionalProperties: false
    required:
    - id
    - version
    properties:
      id:
        type: integer
        description: |
          Uniquely identifies the reputation profile condition.
      name:
        type: string
        description: |
          The name you assigned to the reputation profile condition.
      description:
        type: string
        description: |
          Describes the reputation profile condition.
      version:
        type: integer
        description: |
          The version of the reputation profile condition.
      atomicConditions:
        type: array
        description: |
          The conditions that trigger the reputation profile.
        items:
          type: object
          additionalProperties: false
          required:
          - className
          - positiveMatch
          - value
          properties:
            name:
              description: |
                The condition value of `name`. This only applies to the `RequestHeaderCondition`, and `RequestCookieCondition` condition `className`.
              oneOf:
              - title: Single name
                type: string
              - items:
                  type: string
                type: array
                title: Array of names
            value:
              type: array
              description: |
                The list of values that trigger the condition.
              minItems: 1
              uniqueItems: true
              items:
                type: string
            checkIps:
              type: string
              description: |
                Use `both` to include the `X-Forwarded-For` (XFF) header and the client’s IP address. Use `connecting` to exclude the XFF header. The XFF header is easily spoofed, so only include it in rare cases.
              enum:
              - connecting
              - both
            className:
              type: string
              description: |
                The condition type. Either `NetworkListCondition`, `AsNumberCondition`, `IpAddressCondition`, `RequestCookieCondition`, `RequestHeaderCondition`, `HostCondition`, or `UrlPatternCondition`.
              enum:
              - NetworkListCondition
              - AsNumberCondition
              - IpAddressCondition
              - RequestCookieCondition
              - RequestHeaderCondition
              - HostCondition
              - UrlPatternCondition
            host:
              type: array
              description: |
                A list of hostnames. This only applies to the `HostCondition` `className`.
              minItems: 1
              uniqueItems: true
              items:
                type: string
                description: |
                  A hostname.
                minLength: 1
            index:
              type: integer
              description: |
                The location of the parameter's data within the array.
            nameCase:
              type: boolean
              description: |
                Whether to consider the case sensitivity of the provided query names.
            nameWildcard:
              type: boolean
              description: |
                Whether the provided value of `name` is a wildcard. This only applies to the `RequestHeaderCondition`, and `RequestCookieCondition` condition `className`.
            positiveMatch:
              type: boolean
              description: |
                Whether the condition should trigger on a match (`true`) or a lack of match (`false`).
            valueCase:
              type: boolean
              description: |
                Whether to consider the character case when comparing the value string with the request value. The default is `false`, meaning that a value such as `url` would match a string `UrL` in the request.
              default: false
            valueWildcard:
              type: boolean
              description: |
                Whether to treat the asterisk (`*`) and question mark (`?`) as wildcards when comparing the value string with the request value. Note that setting this to `false` isn't supported by the host condition, and means that the value string must match exactly.
              default: true
      canDelete:
        type: boolean
        description: |
          Whether the condition can be deleted.
      configVersionId:
        type: integer
        description: |
          Unique identifier of the config version.
      positiveMatch:
        type: boolean
        description: |
          Whether the condition should trigger on a match (`true`) or a lack of match (`false`).
      uuid:
        type: string
        description: |
          The universally unique identifier (UUID) of the reputation profile condition.
  context:
    type: string
    description: |
      Identifies the reputation category. Either `WEBSCRP`, `DOSATCK`, `WEBATCK`, `ACCATCK`, `SCANTL`, `2_WEBSCRP`, `2_DOSATCK`, `2_WEBATCK`, `2_ACCATCK`, or `2_SCANTL`.
    enum:
    - WEBSCRP
    - DOSATCK
    - WEBATCK
    - ACCATCK
    - SCANTL
    - 2_WEBSCRP
    - 2_DOSATCK
    - 2_WEBATCK
    - 2_ACCATCK
    - 2_SCANTL
  contextReadable:
    type: string
    description: |
      __Read-only__ Describes the reputation category.
    readOnly: true
  enabled:
    type: boolean
    description: |
      __Read-only__ Whether you enabled the reputation profile.
    readOnly: true
  threshold:
    type: number
    description: |
      The threshold when the profile to triggers.
