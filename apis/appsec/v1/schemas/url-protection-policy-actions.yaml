type: object
description: |-
  Contains details about the URL protection policy actions.
  
x-akamai:
  file-path: schemas/url-protection-policy-actions.yaml
additionalProperties: false
required:
- urlProtectionActions
properties:
  urlProtectionActions:
    type: array
    description: |
      The actions to take when the specified conditions are met.
    items:
      type: object
      additionalProperties: false
      required:
      - policyId
      - maxRpsAction
      - loadSheddingAction
      properties:
        loadSheddingAction:
          description: |
            The action to assign to this URL protection policy once the intelligent load shedding threshold is reached. Choose `alert`, `deny`, `none`, `deny_custom_{custom_deny_id}` or `challenge_{id}`. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions. If the action is `none`, the URL protection policy is inactive in the policy. Refer to [Challenge actions](https://techdocs.akamai.com/app-api-protector/docs/challenge-actions) for details.
          oneOf:
          - enum:
            - alert
            - deny
            - none
            type: string
            title: Predefined actions
          - minLength: 1
            type: string
            title: Custom actions
            pattern: ^(deny_custom|challenge)_[0-9]+$
        maxRpsAction:
          description: |
            The action to assign to this URL protection policy once the rate control threshold (maximum rate per second) is reached. Choose `alert`, `deny`, `none`, `deny_custom_{custom_deny_id}` or `challenge_{id}`. Run [Modify a custom deny action](https://techdocs.akamai.com/application-security/reference/put-custom-deny) to manage your custom deny actions. If the action is `none`, the URL protection policy is inactive in the policy. Refer to [Challenge actions](https://techdocs.akamai.com/app-api-protector/docs/challenge-actions) for details.
          oneOf:
          - enum:
            - alert
            - deny
            - none
            type: string
            title: Predefined actions
          - minLength: 1
            type: string
            title: Custom actions
            pattern: ^(deny_custom|challenge)_[0-9]+$
        policyId:
          type: integer
          description: |
            __Read-only__ Uniquely identifies each URL protection policy.
          readOnly: true
