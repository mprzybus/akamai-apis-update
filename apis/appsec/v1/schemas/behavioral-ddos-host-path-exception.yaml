type: object
description: |-
  The hostname and path pair combinations excluded from Behavioral DDoS mitigation actions.
  
x-akamai:
  file-path: schemas/behavioral-ddos-host-path-exception.yaml
additionalProperties: false
required:
- hosts
- paths
properties:
  paths:
    type: array
    description: |
      Paths in host and path pairs to exclude.
    minItems: 1
    items:
      type: string
  hosts:
    type: array
    description: |
      Hostnames in host and path pairs to exclude.
    minItems: 1
    items:
      type: string
