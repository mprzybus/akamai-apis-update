type: object
description: |-
  Temporarily disable mitigation for a specific hostname, with the option to choose the duration of its suspension.
  
x-akamai:
  file-path: schemas/behavioral-ddos-suspend.yaml
additionalProperties: false
required:
- hostnames
- fromDate
- toDate
properties:
  fromDate:
    type: string
    description: |
      The start ISO 8601 timestamp of suspension.
    format: date-time
  hostnames:
    type: array
    description: |
      Hostnames to suspend for a specified duration.
    minItems: 1
    items:
      type: string
  toDate:
    type: string
    description: |
      The end ISO 8601 timestamp of suspension.
    format: date-time
