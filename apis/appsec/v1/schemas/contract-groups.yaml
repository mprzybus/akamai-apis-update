type: object
description: |-
  Specifies contracts and groups that have Kona Site Defender or Web Application Firewall.
  
x-akamai:
  file-path: schemas/contract-groups.yaml
additionalProperties: false
properties:
  contract_groups:
    type: array
    description: |
      The list of contract and group pairs.
    items:
      type: object
      additionalProperties: false
      properties:
        contractId:
          type: string
          description: |
            A unique identifier for a contract.
        displayName:
          type: string
          description: |
            The display name for a contract group pair.
        groupId:
          type: integer
          description: |
            A unique identifier for a group.
