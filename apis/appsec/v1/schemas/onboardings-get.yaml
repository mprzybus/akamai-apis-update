type: object
description: |-
  Lists reduced details for all onboarding objects.
  
x-akamai:
  file-path: schemas/onboardings-get.yaml
additionalProperties: false
required:
- onboardings
properties:
  onboardings:
    type: array
    description: |
      Lists onboarding objects on your account.
    minItems: 1
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required:
      - onboardingId
      - onboardingLink
      - onboardingStatus
      - createdBy
      - createdTime
      - modifiedBy
      - modifiedTime
      properties:
        createdBy:
          type: string
          description: |
            __Read-only__ The user who created the onboarding.
          readOnly: true
          minLength: 1
        createdTime:
          type: string
          description: |
            __Read-only__ The time the onboarding was created.
          readOnly: true
        hostnames:
          type: array
          description: |
            A list of hostnames you are configuring for service on our platform.
          items:
            type: string
        modifiedBy:
          type: string
          description: |
            __Read-only__ The most recent user to make changes to the onboarding.
          readOnly: true
          minLength: 1
        modifiedTime:
          type: string
          description: |
            __Read-only__ The date the onboarding was changed.
          readOnly: true
        onboardingId:
          type: integer
          description: |
            A unique identifier for an onboarding.
        onboardingLink:
          type: string
          description: |
            The URL to call when you want to access this onboarding at a later time.
          minLength: 1
        onboardingStatus:
          $ref: ../schemas/onboarding-status.yaml
