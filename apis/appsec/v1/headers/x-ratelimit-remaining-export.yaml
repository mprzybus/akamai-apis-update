description: |-
  Rate limit remaining for an API Key.

  Calls to export versions use weighted rate limiting:
  - Requests with active configuration use 1 token.
  - Requests with inactive configuration use 10 tokens.

  A configuration is considered `active` if it has been activated in either production or staging.
  
example: 20
x-akamai:
  file-path: headers/x-ratelimit-remaining-export.yaml
schema:
  type: integer
