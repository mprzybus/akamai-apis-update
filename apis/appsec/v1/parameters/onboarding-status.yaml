name: onboardingStatuses
in: query
description: |-
  Lists onboardings for a specific status.
  
explode: false
x-akamai:
  file-path: parameters/onboarding-status.yaml
required: false
schema:
  type: array
  example:
  - VALIDATION_PENDING
  - COMPLETE
  minItems: 1
  items:
    $ref: ../schemas/onboarding-status.yaml
