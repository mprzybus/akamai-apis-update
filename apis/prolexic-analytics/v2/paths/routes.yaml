x-akamai:
  file-path: paths/routes.yaml
  path-info: /routed/tunnel/routes
post:
  operationId: post-routed-routes
  summary: List Routed tunnel routes
  tags:
  - Routed tunnel routes
  description: |
    Lists Routed 3.0 GRE and Routed 3.0 GRE over ADC tunnel routes data for all specified policy domains. Use the `prefix` in the response to match with the `bgp-sessions` response.
  requestBody:
    content:
      application/json:
        example:
          $ref: ../examples/funnel-health-request.json
        schema:
          $ref: ../schemas/funnel-health-request.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/funnel-routes-response.json
          schema:
            $ref: ../schemas/funnel-routes-response.yaml
    400:
      $ref: ../errors/error-400.yaml
    403:
      $ref: ../errors/error-403.yaml
    404:
      $ref: ../errors/error-404.yaml
