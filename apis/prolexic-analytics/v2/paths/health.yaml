x-akamai:
  file-path: paths/health.yaml
  path-info: /routed/tunnel/health
post:
  operationId: post-routed-health
  summary: Routed tunnel health
  tags:
  - Routed health
  description: |
    Lists total and healthy tunnel counts for Routed 3.0 GRE and Routed 3.0 GRE over ADC tunnels. Counts are per Akamai location and customer router combination for the unique pair of Akamai IP and remote IP.
  requestBody:
    content:
      application/json:
        example:
          $ref: ../examples/funnel-health-request.json
        schema:
          $ref: ../schemas/funnel-health-request.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/funnel-health-response.json
          schema:
            $ref: ../schemas/funnel-health-response.yaml
    400:
      $ref: ../errors/error-400.yaml
    403:
      $ref: ../errors/error-403.yaml
    404:
      $ref: ../errors/error-404.yaml
