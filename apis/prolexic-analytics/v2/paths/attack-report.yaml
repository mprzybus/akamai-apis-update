x-akamai:
  file-path: paths/attack-report.yaml
  path-info: /attack-report/contract/{contract}/attack-id/{attackId}
parameters:
- $ref: ../parameters/attack-id-path.yaml
- $ref: ../parameters/contract-path.yaml
get:
  operationId: get-attack-report
  summary: Get an attack report
  tags:
  - Attack reports
  description: |
    Generates an attack report for the specified customer and `attackId`.
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/attack-report.json
          schema:
            $ref: ../schemas/attack-report.yaml
    403:
      $ref: ../errors/error-403.yaml
    404:
      $ref: ../errors/error-404.yaml
