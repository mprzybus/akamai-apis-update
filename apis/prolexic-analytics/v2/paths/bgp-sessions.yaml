x-akamai:
  file-path: paths/bgp-sessions.yaml
  path-info: /routed/tunnel/bgp-sessions
post:
  operationId: post-routed-bgp-sessions
  summary: Routed tunnel BGP sessions
  tags:
  - Routed BGP sessions
  description: |
    Lists BGP session information for Routed 3.0 GRE and Routed 3.0 GRE over ADC tunnels in all specified policy domains. Use the `customerBgpPeerIp4` or `customerBgpPeerIp6` from this response to match with `customerBgpPeerIp` and `prefix` based on the IP version in the routes response.
  requestBody:
    content:
      application/json:
        example:
          $ref: ../examples/funnel-health-request.json
        schema:
          $ref: ../schemas/funnel-health-request.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/bgp-session-response.json
          schema:
            $ref: ../schemas/funnel-bgp-session-response.yaml
    400:
      $ref: ../errors/error-400.yaml
    403:
      $ref: ../errors/error-403.yaml
    404:
      $ref: ../errors/error-404.yaml
