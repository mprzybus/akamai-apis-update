x-akamai:
  file-path: paths/metrics.yaml
  path-info: /metrics
post:
  operationId: post-metrics
  summary: Get metrics data
  tags:
  - Metrics
  description: |
    Lists metrics specified in the `type` object, between the given `start` and `end` times, sampled at the given rate and attached to given contract. Responses only contain data for valid requests. More meaningful errors result when requesting data for only one type at a time.
  requestBody:
    required: true
    content:
      application/json:
        example:
          $ref: ../examples/metrics-post-req.json
        schema:
          $ref: ../schemas/metric-data-input.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/metrics-response.json
          schema:
            $ref: ../schemas/metric-response.yaml
    400:
      $ref: ../errors/error-400.yaml
    403:
      $ref: ../errors/error-403.yaml
    404:
      $ref: ../errors/error-404.yaml
