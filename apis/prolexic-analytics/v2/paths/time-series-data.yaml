x-akamai:
  file-path: paths/time-series-data.yaml
  path-info: /time-series-data
get:
  operationId: get-time-series-data
  summary: Get time series data
  tags:
  - Time series data
  description: |
    Lists usage and attack data for individual destination IP addresses. Optionally specify the `startTime` and `endTime` to get data from a specific period. The maximum date range is the last seven days, and by default you get data from the last two hours. Specify `locations` to include only traffic coming through specific data centers, or `source` for specific router types. Indicate the `samplingSize` to determine the number of timestamps to get data for. Enable `sum` to get aggregated data.
  parameters:
  - $ref: ../parameters/destinations-query.yaml
  - $ref: ../parameters/end-time-query.yaml
  - $ref: ../parameters/locations-query.yaml
  - $ref: ../parameters/sampling-size-query.yaml
  - $ref: ../parameters/source-query.yaml
  - $ref: ../parameters/start-time-query.yaml
  - $ref: ../parameters/sum-query.yaml
  responses:
    200:
      description: |
        Successful response.
      content:
        application/json:
          example:
            $ref: ../examples/time-series-data-response.json
          schema:
            $ref: ../schemas/time-series-data-response.yaml
    400:
      $ref: ../errors/error-400.yaml
