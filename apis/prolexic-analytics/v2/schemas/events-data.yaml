type: array
x-akamai:
  file-path: schemas/events-data.yaml
items:
  type: object
  description: |
    The event's detailed attack data.
  additionalProperties: false
  required:
  - eventStartTime
  - eventType
  - isOngoing
  - service
  - severity
  properties:
    eventEndTime:
      type: integer
      description: |
        The event's end time in UNIX epoch seconds (UTC).
    eventInfo:
      type: object
      description: |
        Detailed event information.
      additionalProperties: false
      properties:
        alertInfo:
          type: string
          description: |
            Alert criteria for the event.
        attackEventId:
          type: string
          description: |
            The attack event's unique ID.
        attackId:
          type: string
          description: |
            A unique identifier for the attack.
        attackType:
          type: string
          description: |
            The attack type. These values also appear in `eventTypes`. Refer to [Attack types](https://techdocs.akamai.com/prolexic/reference/attack-types) for a complete list.
          enum:
          - ACK Flood
          - CLDAP Reflection
          - CharGEN Attack
          - Connection Flood
          - DNS Flood
          - FIN Flood
          - FIN PUSH Flood
          - GET Flood
          - GRE Protocol Flood
          - HEAD Flood
          - ICMP Flood
          - IGMP Flood
          - mDNS Flood
          - NTP FLOOD
          - Netbios Flood
          - POST Flood
          - PUSH Flood
          - PUT Flood
          - RESET Flood
          - RIP Flood
          - RPC Flood
          - Reserved Protocol Flood
          - SNMP Flood
          - SQL Server Reflection
          - SSDP Flood
          - SSL GET Flood
          - SSL POST Flood
          - SYN Flood
          - SYN PUSH
          - Sentinel Flood
          - TCP Anomaly
          - TCP Fragment
          - TFTP Flood
          - UDP Flood
          - UDP Fragment
          - XMAS
        destinationIPs:
          type: string
          description: |
            The attack's destination IPs.
        endTime:
          type: boolean
          description: |
            The attack event end time. If event is ongoing, value is `false`.
        eventTicketId:
          type: string
          description: |
            The attack event ticket ID.
        lastOccurred:
          type: integer
          description: |
            The last known event activity time in UNIX epoch seconds (UTC).
        location:
          type: string
          description: |
            The scrub center where the alert originated in the network.
        startTime:
          type: integer
          description: |
            The attack event start time in UNIX epoch seconds.
        topDestinationPorts:
          type: array
          description: |
            The alert event's top destination protocol ports with traffic and flow details.
          items:
            type: object
            additionalProperties:
              type: object
              description: |
                A string-formatted TCP or UDP protocol port number.
              additionalProperties: false
              properties:
                bps:
                  type: string
                  description: |
                    The bits per second rate.
                flows:
                  type: string
                  description: |
                    The total traffic for the flows.
                pps:
                  type: string
                  description: |
                    The packets per second rate.
        topNetProtocols:
          type: array
          description: |
            The alert event's top UDP and TCP protocols with traffic and flow details.
          items:
            type: object
            additionalProperties: false
            properties:
              tcp:
                type: object
                description: |
                  The event's top TCP protocols with traffic and flow details.
                additionalProperties: false
                properties:
                  bps:
                    type: string
                    description: |
                      The bits per second rate.
                  flows:
                    type: string
                    description: |
                      The total traffic for the flows.
                  pps:
                    type: string
                    description: |
                      The packets per second rate.
              udp:
                type: object
                description: |
                  The event's top UDP protocols with traffic and flow details.
                additionalProperties: false
                properties:
                  bps:
                    type: string
                    description: |
                      The bits per second rate.
                  flows:
                    type: string
                    description: |
                      The total traffic for the flows.
                  pps:
                    type: string
                    description: |
                      The packets per second rate.
        topSourceIPs:
          type: array
          description: |
            The alert event's top source IPs with traffic and flow details.
          items:
            type: object
            additionalProperties:
              type: object
              description: |
                A top source IP address.
              additionalProperties: false
              properties:
                bps:
                  type: string
                  description: |
                    The bits per second rate.
                flows:
                  type: string
                  description: |
                    The total traffic for the flows.
                pps:
                  type: string
                  description: |
                    The packets per second rate.
    eventStartTime:
      type: integer
      description: |
        The event's start time in UNIX epoch seconds (UTC).
    eventTitle:
      type: string
      description: |
        A brief description of the event.
    eventType:
      type: string
      description: |
        The type of event. Either `alert` or `attack`.
      enum:
      - alert
      - attack
    isOngoing:
      type: boolean
      description: |
        Whether the event is currently ongoing.
    service:
      type: string
      description: |
        The event service type. Returns `Mitigation` for an attack event. For alert events, returns: `abm`, `abr`, `arb`, `bgp`, `fbm`, `int` or `man`.
      enum:
      - Mitigation
      - abm
      - abr
      - arb
      - bgp
      - fbm
      - int
      - man
    severity:
      type: integer
      description: |
        The event severity level.
