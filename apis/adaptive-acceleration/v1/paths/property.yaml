x-akamai:
  path-info: /properties/{propertyId}
parameters:
- $ref: ../parameters/property-id-path.yaml
get:
  operationId: get-property
  summary: Get a property report
  tags:
  - Property report
  description: |
    Gets the current Adaptive Acceleration report for a specific Ion property.
  responses:
    200:
      description: |
        The response returns the report.
      content:
        application/json:
          example:
            $ref: ../examples/get-property.json
          schema:
            $ref: ../schemas/property.yaml
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    406:
      $ref: ../errors/406.yaml
    503:
      $ref: ../errors/503.yaml
