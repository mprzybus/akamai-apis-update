x-akamai:
  path-info: /properties/{propertyId}/reset
parameters:
- $ref: ../parameters/property-id-path.yaml
post:
  operationId: post-property-reset
  summary: Reset a property report
  tags:
  - Property report
  description: |
    Resets the report Adaptive Acceleration uses to define a server push and preconnect assets. Adaptive Acceleration reviews current real-user monitoring data to reestablish this report.
  responses:
    204:
      description: |
        Report successfully reset.
    400:
      $ref: ../errors/400.yaml
    401:
      $ref: ../errors/401.yaml
    403:
      $ref: ../errors/403.yaml
    404:
      $ref: ../errors/404.yaml
    405:
      $ref: ../errors/405.yaml
    503:
      $ref: ../errors/503.yaml
