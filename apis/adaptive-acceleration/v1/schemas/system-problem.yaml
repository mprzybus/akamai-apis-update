type: object
description: |
  Represents error data in the [RFC 9457](https://www.rfc-editor.org/rfc/rfc9457) Problem Details format.
additionalProperties: false
required:
- type
- title
- status
- instance
- method
- serverIp
- clientIp
- requestId
- requestTime
properties:
  type:
    type: string
    description: |
      Identifies each error case.
    format: uri
  title:
    type: string
    description: |
      A summary of each error case.
    minLength: 1
  status:
    type: integer
    description: |
      The HTTP status code that categorizes this error case.
    minimum: 100
    maximum: 600
  instance:
    type: string
    description: |
      A unique value generated with each API call.
    format: uri
  method:
    type: string
    description: |
      An HTTP method used in a given API call.
    minLength: 1
  serverIp:
    type: string
    description: |
      The server IP address.
    format: ipv4
  clientIp:
    type: string
    description: |
      The client IP address.
    format: ipv4
  requestId:
    type: string
    description: |
      A unique identifier of each API call.
    minLength: 1
  requestTime:
    type: string
    description: |
      An ISO 8601 timestamp indicating when each API call was made.
    format: date-time
  detail:
    type: string
    description: |
      Diagnostic instructions to locate and fix the problem.
    minLength: 1
