type: object
description: |
  Represents error data in the [RFC 9457](https://www.rfc-editor.org/rfc/rfc9457) Problem Details format.
additionalProperties: false
required:
- type
- title
- httpStatus
- detail
- instance
properties:
  type:
    type: string
    description: |
      Identifies each error case.
    format: uri
  title:
    type: string
    description: |
      A summary of each error case.
    minLength: 1
  httpStatus:
    type: integer
    description: |
      The HTTP status code that categorizes this error case.
    minimum: 100
    maximum: 600
  detail:
    type: string
    description: |
      Diagnostic instructions to locate and fix the problem. Appears as `null` if no further details about the specific nature of the error that occurred are available.
    minLength: 1
    nullable: true
  instance:
    type: string
    description: |
      A unique value generated with each API call.
    minLength: 1
