openapi: 3.0.0
info:
  title: Report schedules
  version: v3
servers:
- url: https://{hostname}/etp-report/v3
tags:
- description: |
    Set up schedules to generate SIA reports.
  name: Report schedules
x-akamai:
  auth-type: EDGE_GRID
paths:
